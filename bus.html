    <style>

        header { background: var(--kmb-red); color: white; padding: 15px; text-align: center; border-radius: 0 0 10px 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); position: relative; }

        .header-gps { position: absolute; top: 12px; left: 12px; background: rgba(255,255,255,0.2); color: white; border: 1px solid rgba(255,255,255,0.5); padding: 4px 8px; border-radius: 12px; font-size: 13px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; line-height: 1; transition: all 0.3s ease; user-select: none; -webkit-user-select: none; }

        .header-gps.connecting { background: #e65100; border-color: #ff9800; }
        .section { margin-bottom: 25px; }
        h2 { font-size: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; user-select: none; -webkit-user-select: none; }
        .card, .group-header, .fav-tab { user-select: none; -webkit-user-select: none; -webkit-touch-callout: none; }

        .station-info { flex-grow: 1; }

        .fav-tab { flex: 0 0 auto; padding: 8px 15px; background: #eee; border-radius: 20px; cursor: pointer; font-size: 14px; font-weight: bold; display: flex; align-items: center; gap: 5px; border: 1px solid transparent; touch-action: pan-x; }

        /* GPS & Sort controls */
        .fav-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: var(--card-bg); padding: 10px 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 14px; user-select: none; -webkit-user-select: none; }
        .switch { position: relative; display: inline-block; width: 36px; height: 20px; }

        .slider:before { position: absolute; content: ""; height: 14px; width: 14px; left: 3px; bottom: 3px; background-color: white; transition: .3s; border-radius: 50%; }
        .switch input:checked + .slider { background-color: var(--kmb-red); }

        #sort-mode-btn { padding: 4px 8px; font-size: 12px; border-radius: 12px; display: flex; align-items: center; gap: 4px; background: #eee; color: #666; border: 1px solid #ddd; cursor: pointer; font-weight: bold; transition: all 0.2s; }

<body>
    <div id="initial-loading">
        <i class="fas fa-spinner fa-spin" style="font-size: 32px; margin-bottom: 15px; color: var(--kmb-red);"></i>
        <span data-i18n="initializing">Initializing routes...</span>
    </div>
    <header>
        <div class="header-gps" id="gps-toggle-pill" onclick="toggleHeaderGPS()">
            <i class="fas fa-location-arrow" id="gps-icon" style="color: rgba(255,255,255,0.6);"></i>
            <span id="gps-status-text" data-i18n="gpsDisabled">GPS Off</span>

        <h1><i class="fas fa-bus"></i> <span data-i18n="title">HK Bus Arrivals</span></h1>
        <div class="lang-switch" id="lang-switch" onclick="toggleLanguage()"></div>
    </header>
    <div class="container">
        <div id="favorites-section" class="section">
            <h2 style="justify-content: space-between;">
                <span><i class="fas fa-star" style="color: #ffc107;"></i> <span data-i18n="favorites">Favorites</span></span>
                <i class="fas fa-sync-alt" id="refresh-btn" style="cursor: pointer; font-size: 18px; color: #666;" onclick="refreshAllETAs()" data-i18n-title="refreshETAs"></i>
            </h2>
            <div id="favorites-tabs" class="fav-tab-bar"></div>
            <div class="fav-controls" style="justify-content: flex-end;">
                <!-- Hidden GPS checkbox to preserve existing JS logic compatibility -->
                <input type="checkbox" id="gps-toggle" style="display: none;">
                <!-- Sort Mode Toggle Button -->
                <button id="sort-mode-btn" onclick="toggleSortMode()">
                    <i class="fas fa-sort"></i> <span id="sort-mode-text" data-i18n="sortCustom">Custom</span>
                </button>
            </div>
            <div id="favorites-list"></div>
        </div>
        <div class="section">
            <div class="tabs">
                <button id="tab-route" class="tab active" onclick="switchTab(event, 'route')"><i class="fas fa-search"></i> <span data-i18n="route">Route</span></button>
                <button id="tab-stop" class="tab" onclick="switchTab(event, 'stop')"><i class="fas fa-map-marker-alt"></i> <span data-i18n="stop">Stop</span></button>
            </div>
            <div id="route-search-ui">
                <div id="search-input-area" style="display: flex; gap: 10px; align-items: flex-start;">
                    <input type="text" id="route-input" data-i18n-placeholder="enterRoute">
                    <button onclick="syncRoutes(true)" class="tab" style="flex: 0 0 auto; width: auto; padding: 12px;" data-i18n-title="refreshCache">
                        <i class="fas fa-sync"></i>
                    </button>
                </div>
                <div id="route-results" class="results-list"></div>
                <div id="stop-selection-results" class="results-list hidden"></div>
            </div>
            <div id="stop-search-ui" class="hidden">
                <div style="display: flex; gap: 10px; align-items: flex-start; margin-bottom: 12px;">
                    <input type="text" id="stop-input" data-i18n-placeholder="enterStop">
                    <button id="sync-stops-btn" onclick="syncStops(true)" class="tab" style="flex: 0 0 auto; width: auto; padding: 12px;" data-i18n-title="refreshStopsCache">
                        <i class="fas fa-sync"></i>
                    </button>
                </div>
                <div id="stop-sync-status" class="hidden" style="font-size: 12px; color: #666; margin-bottom: 10px; text-align: center;"></div>
                <div id="stop-results" class="results-list"></div>
                <div id="stop-details-view" class="results-list hidden"></div>
            </div>
        </div>
    </div>
    <script>
        const APP_VERSION = '1.2.0';
        const UNIFIED_STOPS_DATA = [];
        let activeGroupId = null, _editingGroupId = null, _etaObserver = null;
        const _visibleFavIds = new Set();

        function setupETAObserver() {
            _etaObserver = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const favId = parseInt(entry.target.dataset.favid, 10);
                    if (entry.isIntersecting) {
                        _visibleFavIds.add(favId);
                        if (entry.target.dataset.skipObserver === 'true') {
                            entry.target.removeAttribute('data-skip-observer');
                            return;
                        }
                        BusDB.get('favorites', favId).then(fav => { if (fav) updateETA(fav); });
                    } else {
                        _visibleFavIds.delete(favId);
                    }
                });
            }, { threshold: 0.1 });
        }

        let userLang = localStorage.getItem('app_lang') || ((navigator.language || navigator.userLanguage).startsWith('zh') ? 'tc' : 'en');
        const I18N = {
            tc: {
                title: "香港巴士到站時間", favorites: "我的最愛車站", route: "搜尋路線", stop: "搜尋車站",

                loadingStops: "正在載入車站...", loadingDirections: "正在載入方向...",
                failedStops: "載入車站失敗。", failedDirections: "載入方向失敗。",
                noFavorites: "尚未有最愛車站。請搜尋路線並添加！", emptyGroup: "搜尋路線以加入此群組",
                removeFavorite: "移除此最愛車站？", syncing: "正在從 API 同步路線...",
                initializing: "正在初始化路線...", next: "下班車:", noETA: "暫無預計到站時間",
                error: "錯誤", lastUpdated: "最後更新:", scheduled: "預定班次", min: "分鐘",
                back: "返回", to: "往", outbound: "去程", inbound: "回程", specialVariant: "特別班次",
                selectGroup: "選擇群組", addGroup: "新增群組", newGroupName: "新群組名稱",
                move: "移動", cancel: "取消", others: "其他", manageGroup: "管理群組",
                renameGroup: "重命名群組", deleteGroup: "刪除群組",
                deleteGroupConfirm: "這將同時移除此群組中的所有已儲存巴士。確定嗎？", save: "儲存", invalidName: "請輸入有效的名稱。", gpsDisabled: "GPS 關閉", gpsAcquiring: "獲取 GPS 中...", gpsEnabled: "GPS 運作中", sortCustom: "手動排序", sortDistance: "距離排序", distanceMeter: "{m} 米", distanceKm: "{km} 公里", gpsDenied: "GPS 定位權限被拒絕。", refreshStopsCache: "更新車站緩存",
                corsWarningTitle: "正在以本地檔案協定運行 (受 CORS 限制)", corsWarningDesc: "KMB 開放數據 API 限制了從 `file:///` 協定發起的直接請求。為了獲得極速、穩定且免 Proxy 的即時更新，請使用本地 Web 伺服器託管此儀表板：", corsWarningUrl: "然後訪問：", copyCommand: "複製命令", copied: "已複製！",
                openMapTitle: "打開 Google 地圖", openMapDirectionsBody: "您想打開 Google 地圖並規劃前往「{stop}」的步行路線嗎？", openMapSearchBody: "您想在 Google 地圖中查看「{stop}」的位置嗎？", open: "打開"
            },
            en: {
                title: "HK Bus Arrivals", favorites: "Favorites", route: "Route", stop: "Stop",
                enterRoute: "Enter Route (e.g. 1A, 962X, 3M)...", enterStop: "Enter Stop Name...",
                refreshETAs: "Refresh ETAs", refreshCache: "Refresh Route Cache",
                loadingStops: "Loading stops...", loadingDirections: "Loading directions...",
                failedStops: "Failed to load stops.", failedDirections: "Failed to load directions.",
                noFavorites: "No favorites yet. Search a route to add one!", emptyGroup: "Search for a route to add it to this group",
                removeFavorite: "Remove this favorite?", syncing: "Syncing routes from API...",
                initializing: "Initializing routes...", next: "Next:", noETA: "No ETA",
                error: "Error", lastUpdated: "Last updated:", scheduled: "Scheduled", min: "min",
                back: "Back", to: "to", outbound: "Outbound", inbound: "Inbound", specialVariant: "Special Variant",
                selectGroup: "Select Group", addGroup: "Add Group", newGroupName: "New Group Name",
                move: "Move", cancel: "Cancel", others: "Others", manageGroup: "Manage Group",
                renameGroup: "Rename Group", deleteGroup: "Delete Group",
                deleteGroupConfirm: "This will also remove all saved buses in this group. Are you sure?", save: "Save", invalidName: "Please enter a valid name.", gpsDisabled: "GPS Off", gpsAcquiring: "Acquiring GPS...", gpsEnabled: "GPS Active", sortCustom: "Custom Sort", sortDistance: "Distance Sort", distanceMeter: "{m}m", distanceKm: "{km}km", gpsDenied: "GPS Permission denied.", refreshStopsCache: "Refresh Stops Cache",
                corsWarningTitle: "Running via Local File Protocol (CORS Restricted)", corsWarningDesc: "KMB Open Data API restricts direct requests from `file:///` URLs. For instant, high-speed, and proxy-free updates, please host this dashboard using a local web server:", corsWarningUrl: "Then visit:", copyCommand: "Copy Command", copied: "Copied!",
                openMapTitle: "Open Google Maps", openMapDirectionsBody: "Would you like to open Google Maps and get walking directions to \"{stop}\"?", openMapSearchBody: "Would you like to view \"{stop}\" on Google Maps?", open: "Open"
            }
        };
        const t = (key) => I18N[userLang][key] || key;
        const localized = (obj, fieldBase) => obj[`${fieldBase}_${userLang}`] || obj[`${fieldBase}_tc`] || obj[fieldBase];

        function toggleLanguage() {
            userLang = userLang === 'tc' ? 'en' : 'tc';
            localStorage.setItem('app_lang', userLang);
            updateLabels();
            renderFavorites();
        }

        function updateLabels() {
            document.getElementById('page-title').textContent = t('title');
            document.getElementById('lang-switch').textContent = userLang === 'tc' ? 'EN' : '中';
            document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.getAttribute('data-i18n')); });
            document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { el.placeholder = t(el.getAttribute('data-i18n-placeholder')); });
            document.querySelectorAll('[data-i18n-title]').forEach(el => { el.title = t(el.getAttribute('data-i18n-title')); });
        }

        function openGenericModal(title, bodyHtml, footerHtml, isDanger = false) {
            document.getElementById('g-modal-title').textContent = title;
            document.getElementById('g-modal-body').innerHTML = bodyHtml;
            const footer = document.getElementById('g-modal-footer');
            footer.innerHTML = footerHtml || '';
            footer.style.display = footerHtml ? 'flex' : 'none';
            document.getElementById('g-modal-header').style.backgroundColor = isDanger ? 'var(--kmb-red)' : '';
            document.getElementById('generic-modal').classList.remove('hidden');
        }
        function closeGenericModal() { document.getElementById('generic-modal').classList.add('hidden'); }

        const _etaFlashCache = new Map(), _stationRefreshCooldowns = new Map(), FLASH_CACHE_TTL = 300000;
        let _drawerInterval = null, activeDragCard = null, dragPlaceholder = null, startY = 0, initialTop = 0, dragTimeout = null, isDragging = false, activePointerUpHandler = null;
        let activeDragTab = null, tabDragPlaceholder = null, startX = 0, initialLeft = 0, wasDragged = false;

        let gpsWatchId = null;
        let userCoords = null;
        let gpsEnabled = localStorage.getItem('app_gps_enabled') === 'true';
        let favSortMode = localStorage.getItem('app_fav_sort_mode') || 'custom';

        function startGPS() {

        function getDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // meters
            const phi1 = lat1 * Math.PI / 180;
            const phi2 = lat2 * Math.PI / 180;
            const deltaPhi = (lat2 - lat1) * Math.PI / 180;
            const deltaLambda = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(deltaPhi / 2) * Math.sin(deltaPhi / 2) +
                      Math.cos(phi1) * Math.cos(phi2) *
                      Math.sin(deltaLambda / 2) * Math.sin(deltaLambda / 2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
            return R * c;
        }

        function formatDistance(meters) {
            if (meters < 1000) return t('distanceMeter').replace('{m}', Math.round(meters));
            return t('distanceKm').replace('{km}', (meters / 1000).toFixed(1));
        }

                    const all = await BusAPI.getKMBStops();
                    const info = all.get(f.stopId);
                    if (info) { lat = info.lat; long = info.long; }
                } else if (f.co === 'CTB') {
                    const info = await BusAPI.getCTBStopInfo(f.stopId);
                    if (info) { lat = info.lat; long = info.long; }
                } else if (f.co === 'NLB') {
                    if (f.routeId) {
                        const d = await BusAPI.fetchNLB(`stop.php?action=list&routeId=${f.routeId}`);
                        const stopObj = d?.stops?.find(i => i.stopId === f.stopId);
                        if (stopObj) { lat = stopObj.latitude; long = stopObj.longitude; }
                    }
                }
                if (lat !== null && long !== null) {
                    f.lat = lat;
                    f.long = long;
                    await BusDB.put('favorites', f);

            const resultsEl = document.getElementById('stop-results');
            const detailsEl = document.getElementById('stop-details-view');
            if (detailsEl) detailsEl.classList.add('hidden');
            if (resultsEl) resultsEl.classList.remove('hidden');
            
            if (!q) {
                if (gpsEnabled && userCoords) {
                    showNearbyStops();
                } else {
                    if (resultsEl) resultsEl.innerHTML = `<div style="text-align:center;padding:30px;color:#888;">
                        <i class="fas fa-search-location" style="font-size:32px;margin-bottom:12px;color:#ccc;"></i>
                        <div>${t('enterStop')}</div>
                        <div style="font-size:12px;margin-top:6px;opacity:0.7;">Enable GPS to see nearby stops</div>
                    </div>`;
                }
                return;
            }
            
            const stops = await loadStopsIntoMemory();
            const matches = stops.filter(s => 
                s.name_tc.toUpperCase().includes(q) || 
                s.name_en.toUpperCase().includes(q) ||
                (s.stopId && s.stopId.includes(q))
            ).slice(0, 50);
            
            renderStopSearchResults(matches);
        }

        let _stopsSyncing = false;
        async function syncStops(force = false) {
            if (_stopsSyncing) return;
            const cached = await BusDB.getAll('stops');
            const now = Date.now();
            const THIRTY_DAYS = 2592000000;
            const lastUpdated = await BusDB.getMetadata('stops_last_updated') || 0;
            
            if (!force && cached.length > 0 && (now - lastUpdated < THIRTY_DAYS)) {
                indexCTBRouteStopsInBackground();
                indexKMBRouteStopsInBackground();
                return;
            }
            
            _stopsSyncing = true;
            const statusEl = document.getElementById('stop-sync-status');
            if (statusEl) {
                statusEl.classList.remove('hidden');
                statusEl.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>Initializing stops database...</span>`;
            }
            
            try {
                if (statusEl) statusEl.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>Fetching KMB stops...</span>`;
                const kmbStopsRes = await BusAPI.fetchKMB('/stop', true);
                if (!kmbStopsRes) throw new Error("Failed to fetch KMB stops");
                
                if (statusEl) statusEl.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>Fetching Citybus stops...</span>`;
                const ctbStopsRes = await BusAPI.fetchCTB('/stop/CTB');
                if (!ctbStopsRes) throw new Error("Failed to fetch CTB stops");
                
                if (statusEl) statusEl.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>Fetching NLB route mappings...</span>`;
                const nlbRoutes = allRoutes.filter(r => r.co === 'NLB');
                const nlbStopToRoutes = new Map();
                const nlbStopsTemp = new Map();

                // Fetch NLB stops in parallel batches of 5 to avoid hammering the API
                const NLB_BATCH_SIZE = 5;
                for (let i = 0; i < nlbRoutes.length; i += NLB_BATCH_SIZE) {
                    const batch = nlbRoutes.slice(i, i + NLB_BATCH_SIZE);
                    if (statusEl) statusEl.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>Fetching NLB stops... (${Math.min(i + NLB_BATCH_SIZE, nlbRoutes.length)}/${nlbRoutes.length} routes)</span>`;
                    await Promise.all(batch.map(async r => {
                        try {
                            const d = await BusAPI.fetchNLB(`stop.php?action=list&routeId=${r.routeId}`);
                            if (d && d.stops) {
                                d.stops.forEach(s => {
                                    const stopId = s.stopId;
                                    if (!nlbStopsTemp.has(stopId)) {
                                        nlbStopsTemp.set(stopId, {
                                            stopId: stopId,
                                            name_tc: s.stopName_c,
                                            name_en: s.stopName_e,
                                            lat: s.latitude,
                                            long: s.longitude
                                        });
                                    }
                                    if (!nlbStopToRoutes.has(stopId)) {
                                        nlbStopToRoutes.set(stopId, []);
                                    }
                                    nlbStopToRoutes.get(stopId).push({
                                        route: r.route,
                                        bound: 'O',
                                        serviceType: 1,
                                        routeId: r.routeId
                                    });
                                });
                            }
                        } catch(e) { console.warn("Failed fetching stops for NLB route:", r.route, e); }
                    }));
                }
                
                if (statusEl) statusEl.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>Assembling stop database...</span>`;
                const stopsToWrite = [];
                
                kmbStopsRes.forEach(s => {
                    stopsToWrite.push({
                        id: `KMB_${s.stop}`,
                        co: 'KMB',
                        stopId: s.stop,
                        name_tc: s.name_tc,
                        name_en: s.name_en,
                        lat: parseFloat(s.lat),
                        long: parseFloat(s.long),
                        routes: []
                    });
                });
                
                // Ensure CTB stops are in an array; handle possible {data: [...] } wrapper
                const ctbStopsArray = Array.isArray(ctbStopsRes) ? ctbStopsRes : (ctbStopsRes && Array.isArray(ctbStopsRes.data) ? ctbStopsRes.data : []);
                ctbStopsArray.forEach(s => {
                    stopsToWrite.push({
                        id: `CTB_${s.stop}`,
                        co: 'CTB',
                        stopId: s.stop,
                        name_tc: s.name_tc,
                        name_en: s.name_en,
                        lat: parseFloat(s.lat),
                        long: parseFloat(s.long),
                        routes: [] // populated later by background indexer
                    });
                });
                
                nlbStopsTemp.forEach((s, stopId) => {
                    stopsToWrite.push({
                        id: `NLB_${stopId}`,
                        co: 'NLB',
                        stopId: stopId,
                        name_tc: s.name_tc,
                        name_en: s.name_en,
                        lat: parseFloat(s.lat),
                        long: parseFloat(s.long),
                        routes: nlbStopToRoutes.get(stopId) || []
                    });
                });
                
                if (statusEl) statusEl.innerHTML = `<i class="fas fa-spinner fa-spin"></i> <span>Saving to local database...</span>`;
                
                const tx = BusDB.db.transaction('stops', 'readwrite');
                const store = tx.objectStore('stops');
                store.clear();
                stopsToWrite.forEach(s => store.put(s));
                
                await new Promise((res, rej) => {
                    tx.oncomplete = res;
                    tx.onerror = (e) => rej(e.target.error);
                });
                
                await BusDB.setMetadata('stops_last_updated', Date.now());
                allStopsInMemory = []; // Reset fast cache to force reload
                if (statusEl) {
                    statusEl.innerHTML = `<i class="fas fa-check-circle" style="color:#2e7d32"></i> <span>Stop database synchronized!</span>`;
                    setTimeout(() => statusEl.classList.add('hidden'), 3000);
                }
                
                indexCTBRouteStopsInBackground();
                indexKMBRouteStopsInBackground();
                
            } catch (e) {
                console.error("Stop synchronization failed:", e);
                if (statusEl) {
                    statusEl.innerHTML = `<i class="fas fa-exclamation-triangle" style="color:var(--kmb-red)"></i> <span>Sync failed. Keeping old stop data.</span>`;
                    setTimeout(() => statusEl.classList.add('hidden'), 5000);
                }
            } finally {
                _stopsSyncing = false;
            }
        }

        let _ctbIndexingActive = false;
        async function indexCTBRouteStopsInBackground() {
            if (_ctbIndexingActive) return;
            _ctbIndexingActive = true;
            try {
                const routes = await BusDB.getAll('routes');
                const ctbRoutes = routes.filter(r => r.co === 'CTB');
                const cachedStops = await BusDB.getAll('route_stops');
                const cachedIds = new Set(cachedStops.map(s => s.id));
                
                const toIndex = [];
                for (const r of ctbRoutes) {
                    const idOut = `CTB_${r.route}_outbound_1_`;
                    const idIn = `CTB_${r.route}_inbound_1_`;
                    if (!cachedIds.has(idOut)) toIndex.push({ r, dir: 'outbound', cacheId: idOut });
                    if (!cachedIds.has(idIn)) toIndex.push({ r, dir: 'inbound', cacheId: idIn });
                }
                
                if (toIndex.length === 0) {
                    _ctbIndexingActive = false;
                    return;
                }
                
                const stops = await BusDB.getAll('stops');
                const ctbStopsMap = new Map();
                stops.filter(s => s.co === 'CTB').forEach(s => ctbStopsMap.set(s.stopId, s));
                
                let index = 0;
                const batchSize = 2;
                const interval = setInterval(async () => {
                    if (index >= toIndex.length) {
                        clearInterval(interval);
                        _ctbIndexingActive = false;
                        return;
                    }
                    const batch = toIndex.slice(index, index + batchSize);
                    index += batchSize;
                    
                    await Promise.all(batch.map(async task => {
                        try {
                            const routeStops = await BusAPI.fetchCTB(`/route-stop/CTB/${task.r.route}/${task.dir}`);
                            if (routeStops && routeStops.length > 0) {
                                const matchedStops = routeStops.map(item => {
                                    const details = ctbStopsMap.get(item.stop);
                                    return details ? {
                                        stop: item.stop,
                                        name_tc: details.name_tc,
                                        name_en: details.name_en,
                                        lat: details.lat,
                                        long: details.long
                                    } : null;
                                }).filter(x => x);
                                
                                if (matchedStops.length > 0) {
                                    await BusDB.put('route_stops', {
                                        id: task.cacheId,
                                        stops: matchedStops,
                                        last_updated: Date.now()
                                    });
                                    
                                    for (const s of matchedStops) {
                                        const stopRecord = ctbStopsMap.get(s.stop);
                                        if (stopRecord) {
                                            if (!stopRecord.routes) stopRecord.routes = [];
                                            const alreadyMapped = stopRecord.routes.some(x => x.route === task.r.route && x.bound === (task.dir === 'outbound' ? 'O' : 'I'));
                                            if (!alreadyMapped) {
                                                stopRecord.routes.push({
                                                    route: task.r.route,
                                                    bound: task.dir === 'outbound' ? 'O' : 'I',
                                                    serviceType: 1
                                                });
                                                await BusDB.put('stops', stopRecord);
                                            }
                                        }
                                    }
                                }
                            }
                        } catch (e) {
                            console.warn("Background CTB indexing error for route:", task.r.route, e);
                        }
                    }));
                }, 4000);
            } catch(e) {
                console.error("CTB background indexing loop failed:", e);
                _ctbIndexingActive = false;
            }
        }

        let _kmbIndexingActive = false;
        async function indexKMBRouteStopsInBackground() {
            if (_kmbIndexingActive) return;
            _kmbIndexingActive = true;
            try {
                const routes = await BusDB.getAll('routes');
                const kmbRoutes = routes.filter(r => r.co === 'KMB');
                const cachedStops = await BusDB.getAll('route_stops');
                const cachedIds = new Set(cachedStops.map(s => s.id));
                
                const toIndex = [];
                for (const r of kmbRoutes) {
                    const bound = r.bound;
                    const st = r.service_type || 1;
                    const cacheId = `KMB_${r.route}_${bound === 'I' ? 'inbound' : 'outbound'}_${st}_`;
                    if (!cachedIds.has(cacheId)) {
                        toIndex.push({ r, dir: bound === 'I' ? 'inbound' : 'outbound', serviceType: st, cacheId });
                    }
                }
                
                if (toIndex.length === 0) {
                    _kmbIndexingActive = false;
                    return;
                }
                
                const stops = await BusDB.getAll('stops');
                const kmbStopsMap = new Map();
                stops.filter(s => s.co === 'KMB').forEach(s => kmbStopsMap.set(s.stopId, s));
                
                let index = 0;
                const batchSize = 2;
                const interval = setInterval(async () => {
                    if (index >= toIndex.length) {
                        clearInterval(interval);
                        _kmbIndexingActive = false;
                        return;
                    }
                    const batch = toIndex.slice(index, index + batchSize);
                    index += batchSize;
                    
                    await Promise.all(batch.map(async task => {
                        try {
                            const kdir = task.dir === 'inbound' ? 'inbound' : 'outbound';
                            const routeStops = await BusAPI.fetchKMB(`/route-stop/${task.r.route}/${kdir}/${task.serviceType}`);
                            if (routeStops && routeStops.length > 0) {
                                const matchedStops = routeStops.map(item => {
                                    const details = kmbStopsMap.get(item.stop);
                                    return details ? {
                                        stop: item.stop,
                                        name_tc: details.name_tc,
                                        name_en: details.name_en,
                                        lat: details.lat,
                                        long: details.long
                                    } : null;
                                }).filter(x => x);
                                
                                if (matchedStops.length > 0) {
                                    await BusDB.put('route_stops', {
                                        id: task.cacheId,
                                        stops: matchedStops,
                                        last_updated: Date.now()
                                    });
                                    
                                    for (const s of matchedStops) {
                                        const stopRecord = kmbStopsMap.get(s.stop);
                                        if (stopRecord) {
                                            if (!stopRecord.routes) stopRecord.routes = [];
                                            const alreadyMapped = stopRecord.routes.some(x => x.route === task.r.route && x.bound === task.r.bound && x.serviceType === task.serviceType);
                                            if (!alreadyMapped) {
                                                stopRecord.routes.push({
                                                    route: task.r.route,
                                                    bound: task.r.bound,
                                                    serviceType: task.serviceType
                                                });
                                                await BusDB.put('stops', stopRecord);
                                            }
                                        }
                                    }
                                }
                            }
                        } catch (e) {
                            console.warn("Background KMB indexing error for route:", task.r.route, e);
                        }
                    }));
                }, 4000);
            } catch(e) {
                console.error("KMB background indexing loop failed:", e);
                _kmbIndexingActive = false;
            }
        }

        function getStopRouteDestination(co, route, bound, serviceType, routeId) {
            let match = null;
            if (co === 'KMB') {
                match = allRoutes.find(x => x.co === 'KMB' && x.route === route && x.bound === bound && (x.service_type || 1) === (serviceType || 1));
                if (!match) match = allRoutes.find(x => x.co === 'KMB' && x.route === route && x.bound === bound);
            } else if (co === 'CTB') {
                match = allRoutes.find(x => x.co === 'CTB' && x.route === route);
            } else if (co === 'NLB') {
                match = allRoutes.find(x => x.co === 'NLB' && x.route === route && x.routeId === routeId);
                if (!match) match = allRoutes.find(x => x.co === 'NLB' && x.route === route);
            }
            if (!match) return routeId || '';
            if (co === 'CTB') {
                const isBack = (bound === 'I' || bound === 'inbound');
                const field = isBack ? 'orig' : 'dest';
                return localized(match, field);
            } else {
                return localized(match, 'dest');
            }
        }

        function exitStopDetails() {

            const detailsEl = document.getElementById('stop-details-view');
            if (resultsEl) resultsEl.classList.remove('hidden');
            if (detailsEl) detailsEl.classList.add('hidden');
        }

        async function fetchStopRoutesETAs(s) {
            s.routes.forEach(async r => {
                const st = r.serviceType || 1;
                const etaEl = document.getElementById(`stop-eta-${s.co}-${s.stopId}-${r.route}-${st}`);
                if (!etaEl) return;
                
                try {
                    const etas = await BusAPI.getETA(s.co, s.stopId, r.route, st, r.routeId, r.bound);
                    if (!etas || etas.length === 0) {
                        etaEl.textContent = t('noETA');
                        etaEl.style.color = '#777';
                        return;
                    }
                    
                    etaEl.innerHTML = etas.slice(0, 3).map(i => {
                        const relTime = getRelativeTime(s.co === 'NLB' ? i.estimatedArrivalTime : i.eta);
                        return `<span>${relTime}</span>`;
                    }).join(', ');

        async function handlePointerDown(e, card, f) {
            if (e.target.closest('.remove-btn, .fav-star, .edit-group-btn')) return;
            if (favSortMode === 'distance') return; // Disable drag if sorting by distance
            startY = e.clientY; wasDragged = false;
            dragTimeout = setTimeout(() => {
                isDragging = true; activeDragCard = card; wasDragged = true; 
                document.body.style.userSelect = document.body.style.webkitUserSelect = 'none';
                document.body.style.overflow = 'hidden'; // Lock scrolling
                card.style.touchAction = 'none';
                const container = document.getElementById('favorites-list'), rect = card.getBoundingClientRect(), crect = container.getBoundingClientRect();
                dragPlaceholder = document.createElement('div'); dragPlaceholder.className = 'drag-placeholder'; dragPlaceholder.style.height = `${rect.height}px`;
                card.classList.add('dragging'); card.style.width = `${rect.width}px`; initialTop = rect.top - crect.top; card.style.top = `${initialTop}px`; card.style.left = `${rect.left - crect.left}px`;
                container.insertBefore(dragPlaceholder, card);
            }, 300);
            activePointerUpHandler = ev => handlePointerUp(ev, card);
            document.addEventListener('pointermove', handlePointerMove, { passive: false }); document.addEventListener('pointerup', activePointerUpHandler); document.addEventListener('pointercancel', activePointerUpHandler);
        }

        function handlePointerMove(e) {
            if (!isDragging) { if (dragTimeout && Math.abs(e.clientY - startY) > 15) { clearTimeout(dragTimeout); dragTimeout = null; } return; }
            e.preventDefault(); const dy = e.clientY - startY, c = document.getElementById('favorites-list');
            activeDragCard.style.top = `${initialTop + dy}px`;
            const after = getDragAfterElement(c, e.clientY); if (after == null) c.appendChild(dragPlaceholder); else c.insertBefore(dragPlaceholder, after);
        }

        function handlePointerUp(e, card) {
            document.removeEventListener('pointermove', handlePointerMove); document.removeEventListener('pointerup', activePointerUpHandler); document.removeEventListener('pointercancel', activePointerUpHandler);
            if (dragTimeout) { clearTimeout(dragTimeout); dragTimeout = null; }
            if (!isDragging) return; isDragging = false; 
            card.style.touchAction = ''; 
            document.body.style.userSelect = document.body.style.webkitUserSelect = '';
            document.body.style.overflow = ''; // Restore scrolling
            const c = document.getElementById('favorites-list'); card.classList.remove('dragging'); card.style.position = card.style.top = card.style.left = card.style.width = '';
            if (dragPlaceholder) {

            activeDragCard = dragPlaceholder = null;
        }

        async function renderFavorites(skipApiRefresh = false) {
            if (_etaObserver) _etaObserver.disconnect(); _visibleFavIds.clear();
            const fs = await BusDB.getAll('favorites'), gs = await BusDB.getAll('favorite_groups'); gs.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
            if (gs.length > 0 && (activeGroupId === null || !gs.find(g => g.id === activeGroupId))) activeGroupId = gs[0].id;
            const tc = document.getElementById('favorites-tabs'); tc.innerHTML = '';
            gs.forEach(g => {
                const isActive = activeGroupId === g.id, tab = document.createElement('div'); tab.className = `fav-tab ${isActive ? 'active' : ''}`; tab.dataset.groupid = g.id; tab.oncontextmenu = () => false;
                tab.innerHTML = `<span>${localized(g, 'name')}</span>${isActive ? `<i class='fas fa-cog edit-group-btn' style='opacity:0.7;cursor:pointer' onclick='handleGroupEditClick(event, ${g.id})'></i>` : ''}`;
                tab.addEventListener('pointerdown', e => handleTabPointerDown(e, tab, g));
                tab.onclick = () => { if (!wasDragged) { activeGroupId = g.id; renderFavorites(); } }; tc.appendChild(tab);
            });
            const lc = document.getElementById('favorites-list'); lc.innerHTML = '';
            const gfs = fs.filter(f => f.groupId === activeGroupId);
            
            // Asynchronously backfill coordinates for favorites in the current group that are missing them
            await Promise.all(gfs.map(f => ensureFavoriteCoordinates(f)));
            
            // Calculate distances if user's GPS coordinates are available
            if (userCoords) {
                gfs.forEach(f => {
                    if (f.lat !== undefined && f.long !== undefined && f.lat !== null && f.long !== null) {
                        f._distance = getDistance(userCoords.lat, userCoords.long, parseFloat(f.lat), parseFloat(f.long));
                    } else {
                        f._distance = Infinity;
                    }
                });
            } else {
                gfs.forEach(f => {
                    f._distance = undefined;
                });
            }
            
            // Sort by distance if distance sorting mode is selected
            if (favSortMode === 'distance' && userCoords) {
                gfs.sort((a, b) => a._distance - b._distance);
            } else {
                gfs.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
            }

            if (gfs.length === 0) { const m = document.createElement('div'); m.style.cssText = 'text-align:center;padding:20px;color:#888'; m.textContent = t('emptyGroup'); lc.appendChild(m); }
            else {
                gfs.forEach(f => {
                    const card = createFavoriteCard(f);
                    
                    if (skipApiRefresh) {
                        const cached = getFlashCache(f.co, f.stopId, f.route, f.serviceType || 1);
                        if (cached && cached.length > 0) {
                            // We have cached data! Set the flag to skip the initial IntersectionObserver network trigger
                            card.dataset.skipObserver = "true";
                            const etaList = card.querySelector(`.eta-list`);
                            if (etaList) {
                                etaList.innerHTML = cached.slice(0, 3).map(i => `<span>${getRelativeTime(f.co === 'NLB' ? i.estimatedArrivalTime : i.eta)}</span>`).join(', ');
                            }
                        }
                    }
                    
                    lc.appendChild(card);
                    if (_etaObserver) _etaObserver.observe(card);
                });
            }
            
            if (!skipApiRefresh) {
                refreshAllETAs();
            }
        }

        async function handleGroupEditClick(e, gid) {
            e.stopPropagation(); _editingGroupId = gid; const g = (await BusDB.getAll('favorite_groups')).find(x => x.id === gid); if (!g) return;
            const isDef = (gid === 1 || gid === 2), body = `<div style='display:flex;flex-direction:column;gap:10px'><button class='btn btn-save' onclick='openRenameModal()' style='width:100%;display:flex;justify-content:center;gap:8px;background:#eee;color:#333'><i class='fas fa-edit'></i> ${t('renameGroup')}</button>${isDef ? '' : `<button class='btn btn-save' onclick='openDeleteConfirmModal()' style='width:100%;display:flex;justify-content:center;gap:8px;background:#ffeeee;color:var(--kmb-red)'><i class='fas fa-trash'></i> ${t('deleteGroup')}</button>`}</div>`;
            openGenericModal(localized(g, 'name'), body);
        }

        async function openRenameModal() {
            const g = (await BusDB.getAll('favorite_groups')).find(x => x.id === _editingGroupId); if (!g) return;
            const body = `<input type='text' id='rename-group-input' value='${localized(g, 'name')}' style='width:100%;padding:10px;border:1px solid #ccc;border-radius:5px;box-sizing:border-box'>`;
            const footer = `<button class='btn btn-cancel' onclick='closeGenericModal()'>${t('cancel')}</button><button class='btn btn-save' onclick='submitRenameGroup()'>${t('save')}</button>`;
            openGenericModal(t('renameGroup'), body, footer);
            setTimeout(() => { const i = document.getElementById('rename-group-input'); i.focus(); i.addEventListener('keyup', e => { if (e.key === 'Enter') submitRenameGroup(); }); }, 100);
        }

        async function submitRenameGroup() {
            const name = document.getElementById('rename-group-input').value.trim(); if (!name) return alert(t('invalidName'));
            const g = (await BusDB.getAll('favorite_groups')).find(x => x.id === _editingGroupId); if (g) { g.name_tc = g.name_en = name; await BusDB.put('favorite_groups', g); closeGenericModal(); renderFavorites(); }
        }

        function openDeleteConfirmModal() { openGenericModal(`${t('deleteGroup')}?`, `<p style='margin:0;font-size:14px;color:#555'>${t('deleteGroupConfirm')}</p>`, `<button class='btn btn-cancel' onclick='closeGenericModal()'>${t('cancel')}</button><button class='btn btn-save' onclick='submitDeleteGroup()' style='background:var(--kmb-red)'>${t('deleteGroup')}</button>`, true); }

        async function submitDeleteGroup() { await deleteGroup(_editingGroupId); closeGenericModal(); if (activeGroupId === _editingGroupId) activeGroupId = 1; renderFavorites(); }

        async function deleteGroup(gid) { await BusDB.delete('favorite_groups', gid); const fs = await BusDB.getAll('favorites'); for (const f of fs.filter(x => x.groupId === gid)) await BusDB.delete('favorites', f.favId); }

        async function removeFavorite(favId) {
            await BusDB.delete('favorites', favId);
            renderFavorites();
        }

        function openMapDirections(stopName, stopLat, stopLong) {
            let url = '';
            let bodyText = '';
            if (userCoords) {
                url = `https://www.google.com/maps/dir/?api=1&origin=${userCoords.lat},${userCoords.long}&destination=${stopLat},${stopLong}&travelmode=walking`;
                bodyText = `<p style='margin:0;font-size:14px;color:#555'>${t('openMapDirectionsBody').replace('{stop}', stopName)}</p>`;
            } else {
                url = `https://www.google.com/maps/search/?api=1&query=${stopLat},${stopLong}`;
                bodyText = `<p style='margin:0;font-size:14px;color:#555'>${t('openMapSearchBody').replace('{stop}', stopName)}</p>`;
            }
            
            const footer = `<button class='btn btn-cancel' onclick='closeGenericModal()'>${t('cancel')}</button><a href="${url}" target="_blank" class='btn btn-save' onclick='closeGenericModal()' style='background:var(--kmb-red);text-decoration:none;display:inline-flex;justify-content:center;align-items:center;'>${t('open')}</a>`;
            
            openGenericModal(t('openMapTitle'), bodyText, footer);
        }

        function createFavoriteCard(f) {
            const card = document.createElement('div'); card.className = `card co-${f.co}`; card.dataset.favid = f.favId; card.oncontextmenu = () => false; card.addEventListener('pointerdown', e => handlePointerDown(e, card, f));
            card.onclick = e => { if (!wasDragged && !e.target.closest('.remove-btn, .fav-star')) goToRouteStopsFromFav(f); };
            
            const header = document.createElement('div'); header.style.display = 'flex'; header.style.justifyContent = 'space-between'; header.style.alignItems = 'flex-start';
            const info = document.createElement('div');
            const distHtml = (f._distance !== undefined && f._distance !== Infinity) ? `<span class="distance-badge" onclick="event.stopPropagation(); openMapDirections(\`${f[`stopName_${userLang}`] || f.stopName_tc || f.stopName}\`, ${f.lat}, ${f.long})" style="background: #e8f5e9; color: #2e7d32; padding: 2px 6px; border-radius: 4px; font-size: 11px; font-weight: bold; margin-left: 8px; display: inline-flex; align-items: center; gap: 3px; cursor: pointer;"><i class="fas fa-location-dot" style="font-size: 9px;"></i> ${formatDistance(f._distance)}</span>` : '';
            info.innerHTML = `<div class='route-info'><span class='route-no'>${f.route}</span> <span class='dest-name'>${f.co}</span></div><div class='path-info' style='font-size:12px;color:#777;margin-bottom:4px'>${f.path_desc || ''}</div><div class='stop-name'><i class='fas fa-map-marker-alt'></i> ${f[`stopName_${userLang}`] || f.stopName_tc || f.stopName}${distHtml}</div>`;
            
            const actions = document.createElement('div'); actions.style.display = 'flex';
            const moveBtn = document.createElement('button'); moveBtn.className = 'remove-btn'; moveBtn.style.marginRight = '8px'; moveBtn.innerHTML = "<i class='fas fa-folder-open'></i>"; moveBtn.title = t('move');
            moveBtn.onclick = (e) => { e.stopPropagation(); showGroupSelector(null, null, f); };
            
            const removeBtn = document.createElement('button'); removeBtn.className = 'remove-btn'; removeBtn.innerHTML = "<i class='fas fa-trash-can'></i>";
            removeBtn.onclick = (e) => { e.stopPropagation(); if(confirm(t("removeFavorite"))) removeFavorite(f.favId); };
            
            actions.appendChild(moveBtn); actions.appendChild(removeBtn);
            header.appendChild(info); header.appendChild(actions);
            
            const etaRow = document.createElement('div'); etaRow.className = 'eta-row';
            etaRow.innerHTML = `<span><i class='fas fa-clock'></i> ${t('next')}</span><div class='eta-list' id='eta-${f.favId}'>${t('loadingStops')}</div>`;
            
            card.appendChild(header); card.appendChild(etaRow);
            return card;
        }

        async function refreshAllETAs() {
            const b = document.getElementById('refresh-btn'); if (b) b.classList.add('fa-spin');
            try { if (_drawerInterval) { clearInterval(_drawerInterval); _drawerInterval = null; } const fs = await BusDB.getAll('favorites'); await Promise.all(fs.filter(f => f.groupId === activeGroupId && _visibleFavIds.has(f.favId)).map(f => updateETA(f))); }
            catch (e) { console.error('Refresh Error:', e); } finally { if (b) b.classList.remove('fa-spin'); }
        }

        function getRelativeTime(s) { if (!s) return t('scheduled'); const d = Math.floor((new Date(s.replace(' ', 'T')) - new Date()) / 60000); return d <= 0 ? `0 ${t('min')}` : `${d} ${t('min')}`; }

        async function updateETA(f) {
            try {
                const c = document.getElementById(`eta-${f.favId}`); if (!c) return;
                const cached = getFlashCache(f.co, f.stopId, f.route, f.serviceType || 1);
                const r = (etas) => { if (!etas || etas.length === 0) { c.textContent = t('noETA'); return; } c.innerHTML = etas.slice(0, 3).map(i => `<span>${getRelativeTime(f.co === 'NLB' ? i.estimatedArrivalTime : i.eta)}</span>`).join(', '); };
                if (cached) r(cached); const etas = await BusAPI.getETA(f.co, f.stopId, f.route, f.serviceType || 1, f.routeId, f.bound, f.direction);
                if (etas !== null) { setFlashCache(f.co, f.stopId, f.route, f.serviceType || 1, etas); r(etas); }
            } catch (e) {}
        }

        function toggleETADrawer(card, r, s) {
            const d = card.querySelector('.eta-drawer'), isOpen = d.classList.contains('open');
            if (_drawerInterval) { clearInterval(_drawerInterval); _drawerInterval = null; }
            document.querySelectorAll('.eta-drawer.open').forEach(x => { if (x !== d) x.classList.remove('open'); });
            d.classList.toggle('open', !isOpen); if (d.classList.contains('open')) { updateDrawerETA(d, r, s); _drawerInterval = setInterval(() => updateDrawerETA(d, r, s), 30000); }
        }

        const _drawerFetching = new Set();
        async function updateDrawerETA(d, r, s, manual = false) {
            const content = d.querySelector('.eta-content'), status = d.querySelector('.eta-status'), st = r.service_type || 1, key = `${r.co}-${s.stop}-${r.route}-${st}`;
            if (_drawerFetching.has(key)) return; if (manual && (Date.now() - (_stationRefreshCooldowns.get(key) || 0) < 5000)) return;
            _drawerFetching.add(key); if (manual) { const i = status.querySelector('.fa-sync-alt'); if (i) i.classList.add('fa-spin'); }
            const cached = getFlashCache(r.co, s.stop, r.route, st);
            const render = (etas) => {
                if (!etas || etas.length === 0) { content.textContent = t('noETA'); return; }
                content.style.opacity = '0.5'; setTimeout(() => {
                    content.innerHTML = etas.slice(0, 3).map(i => `<div style='display:flex;justify-content:space-between;margin-bottom:4px'><span style='font-weight:bold'>${getRelativeTime(r.co === 'NLB' ? i.estimatedArrivalTime : i.eta)}</span><span style='font-size:12px;color:#777'>${(r.co === 'NLB' ? (userLang === 'tc' ? i.remark_c : i.remark_e) : localized(i, 'rmk')) || ''}</span></div>`).join('');
                    content.style.opacity = '1';
                }, 50);
                const i = document.createElement('i'); i.className = 'fas fa-sync-alt'; i.style.cssText = 'cursor:pointer;margin-left:8px;transition:opacity 0.3s';
                i.onclick = (e) => { e.stopPropagation(); updateDrawerETA(d, r, s, true); };
                const lr = Date.now() - (_stationRefreshCooldowns.get(key) || 0); if (lr < 5000) { i.style.opacity = '0.3'; i.style.cursor = 'not-allowed'; setTimeout(() => { if (status.contains(i)) { i.style.opacity = '1'; i.style.cursor = 'pointer'; } }, 5000 - lr); }
                status.innerHTML = ''; status.textContent = `${t('lastUpdated')} ${new Date().toLocaleTimeString()}`; status.appendChild(i);
            };
            if (cached) render(cached); else content.textContent = t('loadingStops');
            const etas = await BusAPI.getETA(r.co, s.stop, r.route, st, r.routeId, r.bound, r.direction);
            if (etas !== null) { setFlashCache(r.co, s.stop, r.route, st, etas); render(etas); }
            _drawerFetching.delete(key); if (manual) { const now = Date.now(); _stationRefreshCooldowns.set(key, now); setTimeout(() => { const i = status.querySelector('.fa-sync-alt'); if (i) { i.classList.remove('fa-spin'); i.style.opacity = '0.3'; i.style.cursor = 'not-allowed'; setTimeout(() => { if (status.contains(i) && _stationRefreshCooldowns.get(key) === now) { i.style.opacity = '1'; i.style.cursor = 'pointer'; } }, 5000); } }, 500); }
        }

        async function handleFavoriteClick(star, r, s) {
            const st = r.service_type || 1, key = `${r.co}-${r.route}-${s.stop}-${st}`;
            if (_favoriteStopsCache.has(key)) { _favoriteStopsCache.delete(key); star.classList.remove('active'); star.innerHTML = "<i class='far fa-star'></i>"; const f = (await BusDB.getAll('favorites')).find(x => x.co === r.co && x.stopId === s.stop && x.route === r.route && (x.serviceType || 1) === st); if (f) await BusDB.delete('favorites', f.favId); }
            else showGroupSelector(r, s);
        }

        async function migrateFavorites() { const j = localStorage.getItem('bus_favs'); if (j) { try { const f = JSON.parse(j); if (f.length > 0) await BusDB.putAll('favorites', f.map(x => ({...x, path_desc: x.path_desc || '', groupId: x.groupId || 1}))); localStorage.removeItem('bus_favs'); } catch (e) {} } }
        setInterval(() => refreshAllETAs(), 60000);
        function copyServerCmd() {
            const cmd = document.getElementById('local-server-cmd').textContent;
            navigator.clipboard.writeText(cmd).then(() => {
                alert(t('copied'));
            }).catch(err => {
                console.error('Failed to copy command:', err);
            });
        }
        document.addEventListener('DOMContentLoaded', async () => {
            if (window.location.protocol === 'file:') {
                const banner = document.getElementById('local-server-warning');
                if (banner) banner.classList.remove('hidden');
            }
            try { setupETAObserver(); await BusDB.init(); await migrateFavorites(); await syncRoutes(); updateLabels(); } catch (e) { console.error(e); } finally { const l = document.getElementById('initial-loading'); if (l) l.classList.add('hidden'); updateSortModeUI(); if (gpsEnabled) { const t = document.getElementById('gps-toggle'); if (t) t.checked = true; startGPS(); } else { updateGPSUI(false); } renderFavorites(); }
        });
        let tapCount = 0, lastTap = 0; document.querySelector('header h1').addEventListener('click', () => { const now = Date.now(); if (now - lastTap > 500) tapCount = 1; else tapCount++; lastTap = now; if (tapCount === 10) { tapCount = 0; DebugLogger.toggle(true); } });
    </script>
    <div id="debug-console" class="hidden"><div id="debug-header"><span>Debug Console</span><div id="debug-controls"><button onclick="DebugLogger.clear()">Clear</button><button onclick="DebugLogger.toggle(false)">Close</button></div></div><div id="debug-logs"></div></div>
    <div id="generic-modal" class="modal-overlay hidden" onclick="closeGenericModal()"><div class="modal" onclick="event.stopPropagation()"><div class="modal-header" id="g-modal-header"><span id="g-modal-title"></span><i class="fas fa-times" onclick="closeGenericModal()" style="cursor:pointer"></i></div><div class="modal-content" id="g-modal-body"></div><div class="modal-footer" id="g-modal-footer"></div></div></div>
</body>
</html>
