<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Bus Arrivals</title>
    <style>
        :root {
            --kmb-red: #d32f2f;
            --ctb-blue: #00529b;
            --ctb-yellow: #ffdf00;
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #333;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; background: var(--bg-color); color: var(--text-main); }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        header { background: var(--kmb-red); color: white; padding: 15px; text-align: center; border-radius: 0 0 10px 10px; margin-bottom: 20px; }
        .section { margin-bottom: 25px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 10px; cursor: pointer; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #ddd; border-radius: 5px; cursor: pointer; border: none; font-size: inherit; font-family: inherit; }
        .tab.active { background: var(--kmb-red); color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <header><h1>HK Bus Arrivals</h1></header>
    <div class="container">
        <div id="favorites-section" class="section">
            <h2>Favorites</h2>
            <div id="favorites-list"></div>
        </div>
        <div class="section">
            <div class="tabs">
                <button class="tab active" onclick="switchTab(event, 'route')">Search Route</button>
                <button class="tab" onclick="switchTab(event, 'stop')">Search Stop</button>
            </div>
            <div id="route-search-ui">
                <input type="text" id="route-input" placeholder="Enter Route (e.g. 1A, 962X)...">
                <div id="route-results" class="results-list"></div>
            </div>
            <div id="stop-search-ui" class="hidden">
                <input type="text" id="stop-input" placeholder="Enter Stop Name...">
                <div id="stop-results" class="results-list"></div>
            </div>
        </div>
        <div id="eta-display" class="section"></div>
    </div>
    <script>
        const BusAPI = {
            KMB_BASE: 'https://data.etabus.gov.hk/v1/transport/kmb',
            CTB_BASE: 'https://rt.data.gov.hk/v2/transport/citybus',
            
            async fetchKMB(endpoint) {
                const res = await fetch(`${this.KMB_BASE}${endpoint}`);
                return (await res.json()).data;
            },
            
            async fetchCTB(endpoint) {
                const res = await fetch(`${this.CTB_BASE}${endpoint}`);
                return (await res.json()).data;
            },

            async getRouteList(company) {
                if (company === 'KMB') return this.fetchKMB('/route/');
                if (company === 'CTB') return this.fetchCTB('/route/CTB');
            },

            async getETA(company, stopId, route, serviceType = 1) {
                if (company === 'KMB') return this.fetchKMB(`/eta/${stopId}/${route}/${serviceType}`);
                if (company === 'CTB') return this.fetchCTB(`/eta/CTB/${stopId}/${route}`);
            }
        };

        function switchTab(event, type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('route-search-ui').classList.toggle('hidden', type !== 'route');
            document.getElementById('stop-search-ui').classList.toggle('hidden', type !== 'stop');
        }

        let allRoutes = [];

        async function initSearch() {
            try {
                const kmb = await BusAPI.getRouteList('KMB');
                const ctb = await BusAPI.getRouteList('CTB');
                allRoutes = [
                    ...kmb.map(r => ({ ...r, co: 'KMB' })),
                    ...ctb.map(r => ({ ...r, co: 'CTB' }))
                ];
            } catch (error) {
                console.error('Failed to initialize routes:', error);
            }
        }

        function searchRoutes(query, routes) {
            if (!query) return [];
            return routes.filter(r => r.route.startsWith(query)).slice(0, 10);
        }

        document.getElementById('route-input').addEventListener('input', e => {
            const val = e.target.value.toUpperCase();
            const matches = searchRoutes(val, allRoutes);
            renderRouteResults(matches);
        });

        function renderRouteResults(routes) {
            const container = document.getElementById('route-results');
            container.innerHTML = '';
            routes.forEach(r => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => selectRoute(r.co, r.route);
                
                const strong = document.createElement('strong');
                strong.textContent = `${r.co} ${r.route}`;
                
                card.appendChild(strong);
                card.appendChild(document.createTextNode(` - ${r.dest_tc}`));
                
                container.appendChild(card);
            });
        }

        function selectRoute(co, route) {
            console.log('Selected', co, route);
            // Demonstration: Add a dummy favorite to show ETA logic.
            // In a full implementation, this would fetch route stops and let the user pick one.
            const dummyStopId = co === 'KMB' ? 'BFA7B08B8159114D' : '001174'; 
            const dummyStopName = 'Sample Stop (' + route + ')';
            saveFavorite(co, dummyStopId, route, dummyStopName);
            alert(`Added dummy stop for ${co} ${route} to favorites!`);
        }

        function saveFavorite(co, stopId, route, stopName) {
            const favs = JSON.parse(localStorage.getItem('bus_favs') || '[]');
            // Avoid duplicates
            if (!favs.find(f => f.co === co && f.stopId === stopId && f.route === route)) {
                favs.push({ co, stopId, route, stopName });
                localStorage.setItem('bus_favs', JSON.stringify(favs));
            }
            renderFavorites();
        }

        function removeFavorite(co, stopId, route) {
            let favs = JSON.parse(localStorage.getItem('bus_favs') || '[]');
            favs = favs.filter(f => !(f.co === co && f.stopId === stopId && f.route === route));
            localStorage.setItem('bus_favs', JSON.stringify(favs));
            renderFavorites();
        }

        function renderFavorites() {
            const favs = JSON.parse(localStorage.getItem('bus_favs') || '[]');
            const container = document.getElementById('favorites-list');
            if (favs.length === 0) {
                container.innerHTML = '<p>No favorites yet.</p>';
                return;
            }
            container.innerHTML = '';
            favs.forEach(f => {
                const card = document.createElement('div');
                card.className = 'card';
                
                const title = document.createElement('div');
                const strong = document.createElement('strong');
                strong.textContent = `${f.co} ${f.route}`;
                title.appendChild(strong);
                title.appendChild(document.createTextNode(` @ ${f.stopName}`));
                
                const removeBtn = document.createElement('button');
                removeBtn.textContent = 'Remove';
                removeBtn.style.float = 'right';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    removeFavorite(f.co, f.stopId, f.route);
                };
                title.appendChild(removeBtn);

                const etaDiv = document.createElement('div');
                etaDiv.id = `eta-${f.co}-${f.stopId}-${f.route}`;
                etaDiv.textContent = 'Loading...';
                etaDiv.style.marginTop = '10px';
                etaDiv.style.color = 'var(--kmb-red)';
                
                card.appendChild(title);
                card.appendChild(etaDiv);
                container.appendChild(card);
            });
            favs.forEach(f => updateETA(f));
        }

        async function updateETA(f) {
            try {
                const etas = await BusAPI.getETA(f.co, f.stopId, f.route);
                const etaContainer = document.getElementById(`eta-${f.co}-${f.stopId}-${f.route}`);
                if (!etaContainer) return;

                if (!etas || etas.length === 0) {
                    etaContainer.textContent = 'No ETA available';
                    return;
                }
                
                etaContainer.innerHTML = '';
                etas.slice(0, 3).forEach((eta, index) => {
                    const span = document.createElement('span');
                    span.textContent = eta.eta ? new Date(eta.eta).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Scheduled';
                    etaContainer.appendChild(span);
                    if (index < Math.min(etas.length, 3) - 1) {
                        etaContainer.appendChild(document.createTextNode(', '));
                    }
                });
            } catch (e) {
                console.error('Error fetching ETA', e);
                const etaContainer = document.getElementById(`eta-${f.co}-${f.stopId}-${f.route}`);
                if (etaContainer) etaContainer.textContent = 'Error fetching ETA';
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initSearch();
            renderFavorites();
        });
    </script>
</body>
</html>
