<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Bus Arrivals</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --kmb-red: #d32f2f;
            --ctb-blue: #00529b;
            --ctb-yellow: #ffdf00;
            --nlb-green: #2e7d32;
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #333;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; background: var(--bg-color); color: var(--text-main); }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        header { background: var(--kmb-red); color: white; padding: 15px; text-align: center; border-radius: 0 0 10px 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        header h1 { margin: 0; font-size: 24px; }
        .section { margin-bottom: 25px; }
        h2 { font-size: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 12px; cursor: pointer; position: relative; transition: transform 0.1s; }
        .card:active { transform: scale(0.98); }
        .card.co-KMB { border-left: 5px solid var(--kmb-red); }
        .card.co-CTB { border-left: 5px solid var(--ctb-yellow); }
        .card.co-NLB { border-left: 5px solid var(--nlb-green); }
        
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #ddd; border-radius: 5px; cursor: pointer; border: none; font-size: inherit; font-family: inherit; font-weight: bold; }
        .tab.active { background: var(--kmb-red); color: white; }
        .hidden { display: none; }
        
        .eta-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .eta-list { display: flex; gap: 8px; font-weight: bold; color: var(--kmb-red); }
        .co-NLB .eta-list { color: var(--nlb-green); }
        .co-CTB .eta-list { color: var(--ctb-blue); }
        
        .remove-btn { background: none; border: none; color: #999; cursor: pointer; font-size: 18px; padding: 5px; transition: color 0.2s; }
        .remove-btn:hover { color: #ff4444; }
        
        .route-info { display: flex; align-items: baseline; gap: 8px; }
        .route-no { font-size: 18px; font-weight: 800; }
        .dest-name { color: #666; font-size: 14px; }
        .stop-name { font-size: 14px; margin-top: 4px; color: #444; }

        .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .back-btn { background: none; border: none; color: var(--kmb-red); cursor: pointer; font-size: 16px; font-weight: bold; padding: 5px 0; }
    </style>
</head>
<body>
    <header><h1><i class="fas fa-bus"></i> HK Bus Arrivals</h1></header>
    <div class="container">
        <div id="favorites-section" class="section">
            <h2 style="justify-content: space-between;">
                <span><i class="fas fa-star" style="color: #ffc107;"></i> Favorites</span>
                <i class="fas fa-sync-alt" id="refresh-btn" style="cursor: pointer; font-size: 18px; color: #666;" onclick="refreshAllETAs()" title="Refresh ETAs"></i>
            </h2>
            <div id="favorites-list"></div>
        </div>
        <div class="section">
            <div class="tabs">
                <button class="tab active" onclick="switchTab(event, 'route')"><i class="fas fa-search"></i> Route</button>
                <button class="tab" onclick="switchTab(event, 'stop')"><i class="fas fa-map-marker-alt"></i> Stop</button>
            </div>
            <div id="route-search-ui">
                <div id="search-input-area" style="display: flex; gap: 10px; align-items: flex-start;">
                    <input type="text" id="route-input" placeholder="Enter Route (e.g. 1A, 962X, 3M)...">
                    <button onclick="syncRoutes(true)" class="tab" style="flex: 0 0 auto; width: auto; padding: 12px;" title="Refresh Route Cache">
                        <i class="fas fa-sync"></i>
                    </button>
                </div>
                <div id="route-results" class="results-list"></div>
                <div id="stop-selection-results" class="results-list hidden"></div>
            </div>
            <div id="stop-search-ui" class="hidden">
                <input type="text" id="stop-input" placeholder="Enter Stop Name...">
                <div id="stop-results" class="results-list"></div>
            </div>
        </div>
    </div>
    <script>
        const BusDB = {
            DB_NAME: 'HKBusDB',
            DB_VERSION: 1,
            db: null,

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.DB_NAME, this.DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('routes')) {
                            db.createObjectStore('routes', { keyPath: 'id' });
                        }
                        if (!db.objectStoreNames.contains('favorites')) {
                            db.createObjectStore('favorites', { keyPath: 'favId', autoIncrement: true });
                        }
                    };
                    request.onsuccess = (e) => {
                        this.db = e.target.result;
                        resolve();
                    };
                    request.onerror = (e) => reject(e.target.error);
                });
            },

            async put(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    store.put(data);
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            },

            async getAll(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            },

            async clear(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    store.clear();
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            },

            async putAll(storeName, dataArray) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    dataArray.forEach(item => store.put(item));
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            },

            async delete(storeName, key) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    store.delete(key);
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            }
        };

        const BusAPI = {
            KMB_BASE: 'https://data.etabus.gov.hk/v1/transport/kmb',
            CTB_BASE: 'https://rt.data.gov.hk/v2/transport/citybus',
            NLB_BASE: 'https://rt.data.gov.hk/v2/transport/nlb',
            
            async fetchKMB(endpoint) {
                const res = await fetch(`${this.KMB_BASE}${endpoint}`);
                return (await res.json()).data;
            },
            
            async fetchCTB(endpoint) {
                const res = await fetch(`${this.CTB_BASE}${endpoint}`);
                return (await res.json()).data;
            },

            async fetchNLB(endpoint) {
                const res = await fetch(`${this.NLB_BASE}/${endpoint}`);
                return (await res.json());
            },

            async getRouteList(company) {
                if (company === 'KMB') return this.fetchKMB('/route/');
                if (company === 'CTB') return this.fetchCTB('/route/CTB');
                if (company === 'NLB') {
                    const data = await this.fetchNLB('route.php?action=list');
                    return data.routes.map(r => ({
                        route: r.routeNo,
                        dest_tc: r.routeName_c,
                        routeId: r.routeId
                    }));
                }
            },

            async getStops(company, route, direction, serviceType, routeId) {
                if (company === 'KMB') {
                    const dir = direction === 'outbound' ? 'outbound' : 'inbound';
                    return this.fetchKMB(`/route-stop/${route}/${dir}/${serviceType || 1}`);
                }
                if (company === 'CTB') {
                    const dir = direction === 'outbound' ? 'outbound' : 'inbound';
                    const stops = await this.fetchCTB(`/route-stop/CTB/${route}/${dir}`);
                    // Fetch stop names for CTB
                    const stopData = await Promise.all(stops.slice(0, 20).map(async s => {
                        const info = await this.fetchCTB(`/stop/${s.stop}`);
                        return { stop: s.stop, name_tc: info.name_tc, name_en: info.name_en };
                    }));
                    return stopData;
                }
                if (company === 'NLB') {
                    const data = await this.fetchNLB(`route.php?action=list_stop&routeId=${routeId}`);
                    return data.stops.map(s => ({
                        stop: s.stopId,
                        name_tc: s.stopName_c,
                        name_en: s.stopName_e
                    }));
                }
            },

            async getETA(company, stopId, route, serviceType = 1, routeId) {
                if (company === 'KMB') return this.fetchKMB(`/eta/${stopId}/${route}/${serviceType}`);
                if (company === 'CTB') return this.fetchCTB(`/eta/CTB/${stopId}/${route}`);
                if (company === 'NLB') {
                    const data = await this.fetchNLB(`stop.php?action=estimated_arrival&routeId=${routeId}&stopId=${stopId}`);
                    return data.estimatedArrivals;
                }
            }
        };

        function switchTab(event, type) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('route-search-ui').classList.toggle('hidden', type !== 'route');
            document.getElementById('stop-search-ui').classList.toggle('hidden', type !== 'stop');
            if (type === 'route') {
                document.getElementById('search-input-area').classList.remove('hidden');
                document.getElementById('route-results').classList.remove('hidden');
                document.getElementById('stop-selection-results').classList.add('hidden');
            }
        }

        let allRoutes = [];

        function sortRoutes(routes) {
            return routes.sort((a, b) => {
                // Alphanumeric sort for route numbers
                const res = a.route.localeCompare(b.route, undefined, { numeric: true, sensitivity: 'base' });
                if (res !== 0) return res;
                return a.co.localeCompare(b.co);
            });
        }

        async function syncRoutes(force = false) {
            const cached = await BusDB.getAll('routes');
            const now = Date.now();
            const SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;

            if (!force && cached.length > 0 && (now - (cached[0].last_updated || 0) < SEVEN_DAYS)) {
                allRoutes = sortRoutes(cached);
                return;
            }

            console.log('Syncing routes from API...');
            const results = await Promise.allSettled([
                BusAPI.getRouteList('KMB'),
                BusAPI.getRouteList('CTB'),
                BusAPI.getRouteList('NLB')
            ]);

            const kmb = results[0].status === 'fulfilled' ? results[0].value : [];
            const ctb = results[1].status === 'fulfilled' ? results[1].value : [];
            const nlb = results[2].status === 'fulfilled' ? results[2].value : [];

            if (results.some(r => r.status === 'rejected')) {
                console.warn('Some bus companies failed to sync:', results.filter(r => r.status === 'rejected').map(r => r.reason));
            }

            const timestamp = Date.now();
            const processedRoutes = [
                ...kmb.map(r => ({ ...r, id: `KMB_${r.route}_${r.bound}_${r.service_type}`, co: 'KMB', last_updated: timestamp })),
                ...ctb.map(r => ({ ...r, id: `CTB_${r.route}_${r.dest_tc}`, co: 'CTB', last_updated: timestamp })),
                ...nlb.map(r => ({ ...r, id: `NLB_${r.route}_${r.routeId}`, co: 'NLB', last_updated: timestamp }))
            ];

            if (processedRoutes.length > 0) {
                const sorted = sortRoutes(processedRoutes);
                await BusDB.clear('routes');
                await BusDB.putAll('routes', sorted);
                allRoutes = sorted;
            } else if (cached.length > 0) {
                allRoutes = sortRoutes(cached);
            }
        }

        function searchRoutes(query, routes) {
            if (!query) return [];
            return routes.filter(r => r.route.startsWith(query)).slice(0, 10);
        }

        document.getElementById('route-input').addEventListener('input', e => {
            const val = e.target.value.toUpperCase();
            const matches = searchRoutes(val, allRoutes);
            renderRouteResults(matches);
        });

        function renderRouteResults(routes) {
            const container = document.getElementById('route-results');
            container.innerHTML = '';
            routes.forEach(r => {
                const card = document.createElement('div');
                card.className = `card co-${r.co}`;
                card.onclick = () => selectRoute(r);
                
                const info = document.createElement('div');
                info.className = 'route-info';
                
                const strong = document.createElement('span');
                strong.className = 'route-no';
                strong.textContent = r.route;
                
                const dest = document.createElement('span');
                dest.className = 'dest-name';
                dest.textContent = `to ${r.dest_tc}`;
                
                const coTag = document.createElement('small');
                coTag.style.marginLeft = 'auto';
                coTag.textContent = r.co;
                
                info.appendChild(strong);
                info.appendChild(dest);
                info.appendChild(coTag);
                card.appendChild(info);
                
                container.appendChild(card);
            });
        }

        async function selectRoute(r) {
            const inputArea = document.getElementById('search-input-area');
            const routeResults = document.getElementById('route-results');
            const stopResults = document.getElementById('stop-selection-results');

            inputArea.classList.add('hidden');
            routeResults.classList.add('hidden');
            stopResults.classList.remove('hidden');
            stopResults.innerHTML = '<p style="text-align:center;">Loading stops...</p>';

            try {
                // For KMB/CTB we might need to handle directions. For simplicity, we fetch outbound.
                // In a full app, we would let user toggle direction.
                const direction = (r.co === 'KMB') ? (r.bound === 'O' ? 'outbound' : 'inbound') : 'outbound';
                const stops = await BusAPI.getStops(r.co, r.route, direction, r.service_type, r.routeId);
                
                stopResults.innerHTML = '';
                const header = document.createElement('div');
                header.className = 'results-header';
                header.innerHTML = `<button class="back-btn" onclick="showRouteSearch()"><i class="fas fa-arrow-left"></i> Back</button>
                                   <span style="font-weight:bold;">${r.route} to ${r.dest_tc}</span>`;
                stopResults.appendChild(header);

                stops.forEach(s => {
                    const card = document.createElement('div');
                    card.className = `card co-${r.co}`;
                    card.innerHTML = `<div class="stop-name">${s.name_tc}</div><div class="dest-name">${s.name_en}</div>`;
                    card.onclick = () => {
                        saveFavorite(r, s);
                        showRouteSearch();
                    };
                    stopResults.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching stops:', error);
                stopResults.innerHTML = '<p style="text-align:center;color:red;">Failed to load stops.</p>';
            }
        }

        function showRouteSearch() {
            document.getElementById('search-input-area').classList.remove('hidden');
            document.getElementById('route-results').classList.remove('hidden');
            document.getElementById('stop-selection-results').classList.add('hidden');
        }

        async function saveFavorite(r, s) {
            const path_desc = r.orig_tc ? `${r.orig_tc} ↔ ${r.dest_tc}` : r.dest_tc;
            const fav = {
                co: r.co,
                stopId: s.stop,
                route: r.route,
                stopName: s.name_tc,
                routeId: r.routeId,
                path_desc: path_desc
            };
            
            const favs = await BusDB.getAll('favorites');
            if (!favs.find(f => f.co === fav.co && f.stopId === fav.stopId && f.route === fav.route)) {
                await BusDB.put('favorites', fav);
            }
            renderFavorites();
        }

        async function removeFavorite(favId) {
            await BusDB.delete('favorites', favId);
            renderFavorites();
        }

        async function renderFavorites() {
            const favs = await BusDB.getAll('favorites');
            const container = document.getElementById('favorites-list');
            if (favs.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#888;">No favorites yet. Search a route to add one!</p>';
                return;
            }
            container.innerHTML = '';
            favs.forEach(f => {
                const card = document.createElement('div');
                card.className = `card co-${f.co}`;
                
                const header = document.createElement('div');
                header.style.display = 'flex';
                header.style.justifyContent = 'space-between';
                header.style.alignItems = 'flex-start';

                const info = document.createElement('div');
                info.innerHTML = `<div class="route-info"><span class="route-no">${f.route}</span> <span class="dest-name">${f.co}</span></div>
                                 <div class="path-info" style="font-size: 12px; color: #777; margin-bottom: 4px;">${f.path_desc || ''}</div>
                                 <div class="stop-name"><i class="fas fa-map-marker-alt"></i> ${f.stopName}</div>`;
                
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerHTML = '<i class="fas fa-trash-can"></i>';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    if(confirm('Remove this favorite?')) removeFavorite(f.favId);
                };

                header.appendChild(info);
                header.appendChild(removeBtn);

                const etaDiv = document.createElement('div');
                etaDiv.className = 'eta-row';
                etaDiv.innerHTML = `<span><i class="fas fa-clock"></i> Next:</span><div class="eta-list" id="eta-${f.favId}">Loading...</div>`;
                
                card.appendChild(header);
                card.appendChild(etaDiv);
                container.appendChild(card);
            });
            refreshAllETAs();
        }

        async function refreshAllETAs() {
            const favs = await BusDB.getAll('favorites');
            favs.forEach(f => updateETA(f));
            const btn = document.getElementById('refresh-btn');
            if (btn) {
                btn.classList.add('fa-spin');
                setTimeout(() => btn.classList.remove('fa-spin'), 1000);
            }
        }

        async function updateETA(f) {
            try {
                const etas = await BusAPI.getETA(f.co, f.stopId, f.route, 1, f.routeId);
                const etaContainer = document.getElementById(`eta-${f.favId}`);
                if (!etaContainer) return;

                if (!etas || etas.length === 0) {
                    etaContainer.textContent = 'No ETA';
                    return;
                }
                
                // Standardize ETA format based on company
                const formattedEtas = etas.slice(0, 3).map(item => {
                    let timeStr = '';
                    if (f.co === 'NLB') {
                        // NLB uses estimatedArrivalTime: "YYYY-MM-DD HH:MM:SS"
                        timeStr = item.estimatedArrivalTime ? new Date(item.estimatedArrivalTime.replace(' ', 'T')).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Scheduled';
                    } else {
                        // KMB/CTB use item.eta as ISO string
                        timeStr = item.eta ? new Date(item.eta).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : 'Scheduled';
                    }
                    return timeStr;
                });

                etaContainer.innerHTML = '';
                formattedEtas.forEach((time, index) => {
                    const span = document.createElement('span');
                    span.textContent = time;
                    etaContainer.appendChild(span);
                    if (index < formattedEtas.length - 1) {
                        etaContainer.appendChild(document.createTextNode(', '));
                    }
                });
            } catch (e) {
                console.error('Error fetching ETA', e);
                const etaContainer = document.getElementById(`eta-${f.favId}`);
                if (etaContainer) etaContainer.textContent = 'Error';
            }
        }

        async function migrateFavorites() {
            const oldFavsJson = localStorage.getItem('bus_favs');
            if (oldFavsJson) {
                try {
                    const oldFavs = JSON.parse(oldFavsJson);
                    for (const f of oldFavs) {
                        // For migrated favorites, we don't have path_desc
                        if (!f.path_desc) f.path_desc = ''; 
                        await BusDB.put('favorites', f);
                    }
                    localStorage.removeItem('bus_favs');
                    console.log('Successfully migrated favorites to IndexedDB');
                } catch (e) {
                    console.error('Migration failed', e);
                }
            }
        }

        // Auto-refresh every 60 seconds
        setInterval(() => {
            console.log('Auto-refreshing ETAs...');
            refreshAllETAs();
        }, 60000);

        document.addEventListener('DOMContentLoaded', async () => {
            await BusDB.init();
            await migrateFavorites();
            syncRoutes();
            renderFavorites();
        });
    </script>
</body>
</html>
