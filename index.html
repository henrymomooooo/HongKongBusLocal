<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">HK Bus Arrivals</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --kmb-red: #d32f2f;
            --ctb-blue: #00529b;
            --ctb-yellow: #ffdf00;
            --nlb-green: #2e7d32;
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #333;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; background: var(--bg-color); color: var(--text-main); }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        header { background: var(--kmb-red); color: white; padding: 15px; text-align: center; border-radius: 0 0 10px 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        header h1 { margin: 0; font-size: 24px; }
        .section { margin-bottom: 25px; }
        h2 { font-size: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 12px; cursor: pointer; position: relative; transition: transform 0.1s; }
        .card:active { transform: scale(0.98); }
        .card.co-KMB { border-left: 5px solid var(--kmb-red); }
        .card.co-CTB { border-left: 5px solid var(--ctb-yellow); }
        .card.co-NLB { border-left: 5px solid var(--nlb-green); }
        
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #ddd; border-radius: 5px; cursor: pointer; border: none; font-size: inherit; font-family: inherit; font-weight: bold; }
        .tab.active { background: var(--kmb-red); color: white; }
        .hidden { display: none !important; }
        
        .eta-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .eta-list { display: flex; gap: 8px; font-weight: bold; color: var(--kmb-red); }
        .co-NLB .eta-list { color: var(--nlb-green); }
        .co-CTB .eta-list { color: var(--ctb-blue); }
        
        .remove-btn { background: none; border: none; color: #999; cursor: pointer; font-size: 18px; padding: 5px; transition: color 0.2s; }
        .remove-btn:hover { color: #ff4444; }
        
        .route-info { display: flex; align-items: baseline; gap: 8px; }
        .route-no { font-size: 18px; font-weight: 800; }
        .dest-name { color: #666; font-size: 14px; }
        .stop-name { font-size: 14px; margin-top: 4px; color: #444; }

        .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .back-btn { background: none; border: none; color: var(--kmb-red); cursor: pointer; font-size: 16px; font-weight: bold; padding: 5px 0; }

        .station-card { display: flex; flex-direction: column; padding: 0 !important; }
        .station-main { display: flex; align-items: center; padding: 15px; width: 100%; box-sizing: border-box; }
        .station-info { flex-grow: 1; }
        .fav-star { font-size: 20px; color: #ccc; padding: 10px; cursor: pointer; transition: color 0.2s; }
        .fav-star.active { color: #ffc107; }

        .eta-drawer { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.3s ease-out; 
            background: #f9f9f9; 
            border-top: 1px solid #eee;
        }
        .eta-drawer.open { max-height: 200px; padding: 10px 15px; }
        .eta-content { font-size: 14px; }
        .eta-status { font-size: 11px; color: #999; margin-top: 5px; }

        .card.dragging {
            opacity: 0.8;
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            position: absolute;
            z-index: 1000;
            pointer-events: none;
            margin: 0;
        }
        .drag-placeholder {
            background: transparent;
            border: 2px dashed #ccc;
            border-radius: 8px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        #favorites-list {
            position: relative;
        }
        #initial-loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.9);
            z-index: 2000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            color: var(--text-main);
        }

        /* Debug Console Styles */
        #debug-console {
            width: 100%;
            height: 50vh;
            background: #1e1e1e;
            color: #d4d4d4;
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            z-index: 3000;
            border-top: 2px solid #444;
        }
        body:not(.debug-active) #debug-console {
            position: fixed;
            bottom: 0;
            left: 0;
        }
        #debug-header {
            background: #333;
            padding: 5px 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #444;
        }
        #debug-header span { font-weight: bold; color: #fff; }
        #debug-controls { display: flex; gap: 10px; }
        #debug-controls button {
            background: #444;
            color: #fff;
            border: 1px solid #666;
            padding: 2px 8px;
            cursor: pointer;
            font-size: 11px;
        }
        #debug-controls button:hover { background: #555; }
        #debug-logs {
            flex-grow: 1;
            overflow-y: auto;
            padding: 10px;
        }
        .log-entry { margin-bottom: 8px; border-bottom: 1px solid #333; padding-bottom: 4px; }
        .log-meta { display: flex; gap: 10px; color: #888; margin-bottom: 2px; }
        .log-req { color: #569cd6; }
        .log-res { color: #4ec9b0; }
        .log-err { color: #f44747; }
        .log-payload { white-space: pre-wrap; word-break: break-all; }

        /* Split Screen adjustments */
        body.debug-active {
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        body.debug-active .container {
            flex: 1;
            overflow-y: auto;
            padding-bottom: 20px;
            max-width: 600px;
            width: 100%;
            box-sizing: border-box;
        }
        body.debug-active header { border-radius: 0; margin-bottom: 0; flex-shrink: 0; }
        #debug-console { flex-shrink: 0; }
    </style>
</head>
<body>
    <div id="initial-loading">
        <i class="fas fa-spinner fa-spin" style="font-size: 32px; margin-bottom: 15px; color: var(--kmb-red);"></i>
        <span id="loading-text">Initializing routes...</span>
    </div>
    <header><h1><i class="fas fa-bus"></i> <span id="header-title">HK Bus Arrivals</span></h1></header>
    <div class="container">
        <div id="favorites-section" class="section">
            <h2 style="justify-content: space-between;">
                <span><i class="fas fa-star" style="color: #ffc107;"></i> <span id="fav-title">Favorites</span></span>
                <i class="fas fa-sync-alt" id="refresh-btn" style="cursor: pointer; font-size: 18px; color: #666;" onclick="refreshAllETAs()"></i>
            </h2>
            <div id="favorites-list"></div>
        </div>
        <div class="section">
            <div class="tabs">
                <button id="tab-route" class="tab active" onclick="switchTab(event, 'route')"><i class="fas fa-search"></i> Route</button>
                <button id="tab-stop" class="tab" onclick="switchTab(event, 'stop')"><i class="fas fa-map-marker-alt"></i> Stop</button>
            </div>
            <div id="route-search-ui">
                <div id="search-input-area" style="display: flex; gap: 10px; align-items: flex-start;">
                    <input type="text" id="route-input">
                    <button id="refresh-cache-btn" onclick="syncRoutes(true)" class="tab" style="flex: 0 0 auto; width: auto; padding: 12px;">
                        <i class="fas fa-sync"></i>
                    </button>
                </div>
                <div id="route-results" class="results-list"></div>
                <div id="stop-selection-results" class="results-list hidden"></div>
            </div>
            <div id="stop-search-ui" class="hidden">
                <input type="text" id="stop-input">
                <div id="stop-results" class="results-list"></div>
            </div>
        </div>
    </div>
    <script>
        const APP_VERSION = '1.2.0';

        // Internationalization
        const userLang = (navigator.language || navigator.userLanguage).startsWith('zh') ? 'tc' : 'en';
        const I18N = {
            tc: {
                title: "香港巴士到站時間",
                favorites: "我的最愛車站",
                route: "搜尋路線",
                stop: "搜尋車站",
                enterRoute: "輸入路線 (例如 1A, 962X, 3M)...",
                enterStop: "輸入車站名稱...",
                refreshETAs: "重新整理到站時間",
                refreshCache: "更新路線緩存",
                loadingStops: "正在載入車站...",
                loadingDirections: "正在載入方向...",
                failedStops: "載入車站失敗。",
                failedDirections: "載入方向失敗。",
                noFavorites: "尚未有最愛車站。請搜尋路線並添加！",
                removeFavorite: "移除此最愛車站？",
                syncing: "正在從 API 同步路線...",
                initializing: "正在初始化路線...",
                next: "下班車:",
                noETA: "暫無預計到站時間",
                error: "錯誤",
                lastUpdated: "最後更新:",
                scheduled: "預定班次",
                min: "分鐘",
                back: "返回",
                to: "往",
                outbound: "去程",
                inbound: "回程",
                specialVariant: "特別班次"
            },
            en: {
                title: "HK Bus Arrivals",
                favorites: "Favorites",
                route: "Route",
                stop: "Stop",
                enterRoute: "Enter Route (e.g. 1A, 962X, 3M)...",
                enterStop: "Enter Stop Name...",
                refreshETAs: "Refresh ETAs",
                refreshCache: "Refresh Route Cache",
                loadingStops: "Loading stops...",
                loadingDirections: "Loading directions...",
                failedStops: "Failed to load stops.",
                failedDirections: "Failed to load directions.",
                noFavorites: "No favorites yet. Search a route to add one!",
                removeFavorite: "Remove this favorite?",
                syncing: "Syncing routes from API...",
                initializing: "Initializing routes...",
                next: "Next:",
                noETA: "No ETA",
                error: "Error",
                lastUpdated: "Last updated:",
                scheduled: "Scheduled",
                min: "min",
                back: "Back",
                to: "to",
                outbound: "Outbound",
                inbound: "Inbound",
                specialVariant: "Special Variant"
            }
        };
        const t = (key) => I18N[userLang][key] || key;
        const localized = (obj, fieldBase) => obj[`${fieldBase}_${userLang}`] || obj[`${fieldBase}_tc`] || obj[fieldBase];

        // UI Initialization
        document.getElementById('page-title').textContent = t('title');
        document.getElementById('header-title').textContent = t('title');
        document.getElementById('fav-title').textContent = t('favorites');
        document.getElementById('refresh-btn').title = t('refreshETAs');
        document.getElementById('tab-route').innerHTML = `<i class="fas fa-search"></i> ${t('route')}`;
        document.getElementById('tab-stop').innerHTML = `<i class="fas fa-map-marker-alt"></i> ${t('stop')}`;
        document.getElementById('route-input').placeholder = t('enterRoute');
        document.getElementById('stop-input').placeholder = t('enterStop');
        document.getElementById('refresh-cache-btn').title = t('refreshCache');
        document.getElementById('loading-text').textContent = t('initializing');

        const _etaFlashCache = new Map();
        const _stationRefreshCooldowns = new Map();
        const FLASH_CACHE_TTL = 5 * 60 * 1000; // 5 minutes
        let _drawerInterval = null;

        let activeDragCard = null;
        let dragPlaceholder = null;
        let startY = 0;
        let initialTop = 0;
        let dragTimeout = null;
        let isDragging = false;
        let activePointerUpHandler = null;

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.card:not(.dragging)')];
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        const _favoriteStopsCache = new Set();
        function _isFavorited(r, s) {
            const serviceType = r.service_type || 1;
            const id = `${r.co}-${r.route}-${s.stop}-${serviceType}`;
            return _favoriteStopsCache.has(id);
        }

        function getFlashCache(co, stopId, route, serviceType) {
            const key = `${co}-${stopId}-${route}-${serviceType || 1}`;
            const cached = _etaFlashCache.get(key);
            if (cached && (Date.now() - cached.timestamp < FLASH_CACHE_TTL)) {
                return cached.data;
            }
            return null;
        }

        function setFlashCache(co, stopId, route, serviceType, data) {
            const key = `${co}-${stopId}-${route}-${serviceType || 1}`;
            _etaFlashCache.set(key, { data, timestamp: Date.now() });
        }

        const BusDB = {
            DB_NAME: 'HKBusDB',
            DB_VERSION: 3,
            db: null,

            async init() {
                return new Promise((resolve) => {
                    if (!window.indexedDB) return resolve();
                    try {
                        const request = indexedDB.open(this.DB_NAME, this.DB_VERSION);
                        request.onupgradeneeded = (e) => {
                            const db = e.target.result;
                            if (!db.objectStoreNames.contains('routes')) {
                                db.createObjectStore('routes', { keyPath: 'id' });
                            }
                            if (!db.objectStoreNames.contains('favorites')) {
                                db.createObjectStore('favorites', { keyPath: 'favId', autoIncrement: true });
                            }
                            if (!db.objectStoreNames.contains('metadata')) {
                                db.createObjectStore('metadata', { keyPath: 'key' });
                            }
                            if (!db.objectStoreNames.contains('favorite_groups')) {
                                db.createObjectStore('favorite_groups', { keyPath: 'id', autoIncrement: true });
                            }
                        };
                        request.onsuccess = async (e) => {
                            this.db = e.target.result;
                            await this.checkMigrations();
                            resolve();
                        };
                        request.onerror = (e) => {
                            console.warn('IndexedDB Error:', e.target.error);
                            resolve(); // Continue without DB
                        };
                    } catch (e) {
                        console.warn('IndexedDB not available:', e);
                        resolve(); // Continue without DB
                    }
                });
            },

            async checkMigrations() {
                const storedAppVersion = await this.getMetadata('app_version');
                const dbVer = await this.getMetadata('db_version');

                if (storedAppVersion !== APP_VERSION) {
                    if (!dbVer || dbVer < 3) {
                        // Seed default groups
                        await this.putAll('favorite_groups', [
                            { id: 1, name_tc: '去程', name_en: 'Outgoing', sortOrder: 1 },
                            { id: 2, name_tc: '回程', name_en: 'Back Home', sortOrder: 2 }
                        ]);
                        // Update existing favorites
                        const favs = await this.getAll('favorites');
                        const toUpdate = favs.filter(f => !f.groupId).map(f => ({...f, groupId: 1}));
                        if (toUpdate.length > 0) {
                            await this.putAll('favorites', toUpdate);
                        }
                    }
                    
                    await this.setMetadata('app_version', APP_VERSION);
                    await this.setMetadata('db_version', this.DB_VERSION);
                    const installDate = await this.getMetadata('install_date');
                    if (!installDate) await this.setMetadata('install_date', Date.now());
                }
            },

            async put(storeName, data) {
                return new Promise((resolve, reject) => {
                    if (!this.db) return resolve();
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    store.put(data);
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            },

            async getAll(storeName) {
                return new Promise((resolve, reject) => {
                    if (!this.db) return resolve([]);
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            },

            async clear(storeName) {
                return new Promise((resolve, reject) => {
                    if (!this.db) return resolve();
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    store.clear();
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            },

            async putAll(storeName, dataArray) {
                return new Promise((resolve, reject) => {
                    if (!this.db) return resolve();
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    dataArray.forEach(item => store.put(item));
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            },

            async delete(storeName, key) {
                return new Promise((resolve, reject) => {
                    if (!this.db) return resolve();
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    store.delete(key);
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            },

            async get(storeName, key) {
                return new Promise((resolve, reject) => {
                    if (!this.db) return resolve(null);
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const request = store.get(key);
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            },

            async getMetadata(key) {
                const data = await this.get('metadata', key);
                return data ? data.value : null;
            },

            async setMetadata(key, value) {
                return this.put('metadata', { key, value });
            }
        };

        const DebugLogger = {
            logs: [],
            maxLogs: 50,
            active: false,

            toggle(force) {
                this.active = force !== undefined ? force : !this.active;
                const consoleEl = document.getElementById('debug-console');
                if (this.active) {
                    const debugTitle = document.querySelector('#debug-header span');
                    if (debugTitle) debugTitle.innerHTML = `<i class="fas fa-terminal"></i> Debug Console <small style="opacity: 0.7; font-weight: normal;">(v${APP_VERSION})</small>`;
                    consoleEl.classList.remove('hidden');
                    document.body.classList.add('debug-active');
                    this.render();
                } else {
                    consoleEl.classList.add('hidden');
                    document.body.classList.remove('debug-active');
                }
            },

            log(type, method, url, payload, status = '') {
                const entry = {
                    timestamp: new Date().toLocaleTimeString() + '.' + new Date().getMilliseconds().toString().padStart(3, '0'),
                    type, method, url, payload, status
                };
                this.logs.push(entry);
                if (this.logs.length > this.maxLogs) this.logs.shift();
                if (this.active) this.render();
            },

            clear() {
                this.logs = [];
                this.render();
            },

            render() {
                const container = document.getElementById('debug-logs');
                if (!container) return;
                
                container.innerHTML = this.logs.map(log => `
                    <div class="log-entry">
                        <div class="log-meta">
                            <span>[${log.timestamp}]</span>
                            <span class="log-${log.type.toLowerCase()}">${log.type} ${log.method}</span>
                            <span>${log.status}</span>
                        </div>
                        <div style="color: #bbb; margin-bottom: 2px;">${log.url}</div>
                        <div class="log-payload">${typeof log.payload === 'object' ? JSON.stringify(log.payload, null, 2) : log.payload}</div>
                    </div>
                `).join('');
                container.scrollTop = container.scrollHeight;
            }
        };

        const BusAPI = {
            KMB_BASE: 'https://data.etabus.gov.hk/v1/transport/kmb',
            CTB_BASE: 'https://rt.data.gov.hk/v2/transport/citybus',
            NLB_BASE: 'https://rt.data.gov.hk/v2/transport/nlb',
            _ctbStopCache: new Map(),
            _kmbStopCache: new Map(),

            async getKMBStops() {
                if (this._kmbStopCache.size === 0) {
                    const data = await this.fetchKMB('/stop');
                    if (data) {
                        data.forEach(s => this._kmbStopCache.set(s.stop, s));
                    }
                }
                return this._kmbStopCache;
            },

            async getCTBStops() {
                return this._ctbStopCache;
            },
            
            async fetchKMB(endpoint) {
                const url = `${this.KMB_BASE}${endpoint}`;
                DebugLogger.log('REQ', 'GET', url, '...');
                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const json = await res.json();
                    DebugLogger.log('RES', 'GET', url, json.data, res.status);
                    return json.data;
                } catch (e) {
                    DebugLogger.log('ERR', 'GET', url, e.message);
                    console.error('KMB Fetch Error:', e);
                    return null;
                }
            },
            
            async fetchCTB(endpoint) {
                const url = `${this.CTB_BASE}${endpoint}`;
                DebugLogger.log('REQ', 'GET', url, '...');
                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const json = await res.json();
                    DebugLogger.log('RES', 'GET', url, json.data, res.status);
                    return json.data;
                } catch (e) {
                    DebugLogger.log('ERR', 'GET', url, e.message);
                    console.error('CTB Fetch Error:', e);
                    return null;
                }
            },

            async getCTBStopInfo(stopId) {
                if (!stopId) return null;
                const stops = await this.getCTBStops();
                if (stops.has(stopId)) return stops.get(stopId);
                const url = `${this.CTB_BASE}/stop/${stopId}`;
                DebugLogger.log('REQ', 'GET', url, '...');
                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const json = await res.json();
                    const data = json.data;
                    if (data) {
                        stops.set(stopId, data);
                        DebugLogger.log('RES', 'GET', url, data, res.status);
                        return data;
                    }
                    return null;
                } catch (e) {
                    DebugLogger.log('ERR', 'GET', url, e.message);
                    console.error('Error fetching CTB stop', stopId, e);
                    return null;
                }
            },

            async fetchNLB(endpoint) {
                const url = `${this.NLB_BASE}/${endpoint}`;
                DebugLogger.log('REQ', 'GET', url, '...');
                try {
                    const res = await fetch(url);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const json = await res.json();
                    DebugLogger.log('RES', 'GET', url, json, res.status);
                    return json;
                } catch (e) {
                    DebugLogger.log('ERR', 'GET', url, e.message);
                    console.error('NLB Fetch Error:', e);
                    return null;
                }
            },

            async getRouteList(company) {
                if (company === 'KMB') return this.fetchKMB('/route/');
                if (company === 'CTB') return this.fetchCTB('/route/CTB');
                if (company === 'NLB') {
                    const data = await this.fetchNLB('route.php?action=list');
                    if (!data || !data.routes) return [];
                    return data.routes.map(r => ({
                        route: r.routeNo,
                        dest_tc: r.routeName_c,
                        dest_en: r.routeName_e,
                        routeId: r.routeId
                    }));
                }
            },

            async getStops(company, route, direction, serviceType, routeId) {
                if (company === 'KMB') {
                    const dir = direction === 'outbound' ? 'outbound' : 'inbound';
                    const stops = await this.fetchKMB(`/route-stop/${route}/${dir}/${serviceType || 1}`);
                    if (!stops) return [];
                    const allStops = await this.getKMBStops();
                    return stops.map(s => {
                        const info = allStops.get(s.stop);
                        return { 
                            stop: s.stop, 
                            name_tc: info ? info.name_tc : s.stop, 
                            name_en: info ? info.name_en : s.stop 
                        };
                    });
                }
                if (company === 'CTB') {
                    const dir = direction === 'outbound' ? 'outbound' : 'inbound';
                    const stops = await this.fetchCTB(`/route-stop/CTB/${route}/${dir}`);
                    if (!stops) return [];
                    const stopData = await Promise.all(stops.map(async s => {
                        const info = await this.getCTBStopInfo(s.stop);
                        if (!info) return null;
                        return { 
                            stop: s.stop, 
                            name_tc: info.name_tc, 
                            name_en: info.name_en 
                        };
                    }));
                    return stopData.filter(s => s !== null);
                }
                if (company === 'NLB') {
                    const data = await this.fetchNLB(`stop.php?action=list&routeId=${routeId}`);
                    if (!data || !data.stops) return [];
                    return data.stops.map(s => ({
                        stop: s.stopId,
                        name_tc: s.stopName_c,
                        name_en: s.stopName_e
                    }));
                }
            },

            async getETA(company, stopId, route, serviceType = 1, routeId, bound, direction) {
                if (company === 'KMB') {
                    const data = await this.fetchKMB(`/eta/${stopId}/${route}/${serviceType}`);
                    if (!data) return null;
                    const kmbDir = bound || (direction === 'inbound' ? 'I' : 'O');
                    return data.filter(eta => eta.dir === kmbDir);
                }
                if (company === 'CTB') {
                    const data = await this.fetchCTB(`/eta/CTB/${stopId}/${route}`);
                    if (!data) return null;
                    const ctbDir = (direction === 'inbound' || bound === 'I') ? 'I' : 'O';
                    return data.filter(eta => eta.dir === ctbDir);
                }
                if (company === 'NLB') {
                    const data = await this.fetchNLB(`stop.php?action=estimatedArrivals&routeId=${routeId}&stopId=${stopId}`);
                    if (data === null) return null;
                    if (!data.estimatedArrivals) return [];
                    return data.estimatedArrivals;
                }
            }
        };

        let allRoutes = [];

        function sortRoutes(routes) {
            return routes.sort((a, b) => {
                const res = a.route.localeCompare(b.route, undefined, { numeric: true, sensitivity: 'base' });
                if (res !== 0) return res;
                return a.co.localeCompare(b.co);
            });
        }

        async function syncRoutes(force = false) {
            const cached = await BusDB.getAll('routes');
            const now = Date.now();
            const SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;
            const loadingOverlay = document.getElementById('initial-loading');

            if (!force && cached.length > 0 && (now - (cached[0].last_updated || 0) < SEVEN_DAYS)) {
                allRoutes = sortRoutes(cached);
                loadingOverlay.classList.add('hidden');
                return;
            }

            if (cached.length === 0 || force) {
                loadingOverlay.classList.remove('hidden');
            }

            console.log(t('syncing'));
            const results = await Promise.allSettled([
                BusAPI.getRouteList('KMB'),
                BusAPI.getRouteList('CTB'),
                BusAPI.getRouteList('NLB')
            ]);

            const timestamp = Date.now();
            let processedRoutes = [];

            // KMB
            if (results[0].status === 'fulfilled' && results[0].value && results[0].value.length > 0) {
                processedRoutes.push(...results[0].value.map(r => ({ ...r, id: `KMB_${r.route}_${r.bound}_${r.service_type}`, co: 'KMB', last_updated: timestamp })));
            } else {
                processedRoutes.push(...cached.filter(r => r.co === 'KMB'));
            }

            // CTB
            if (results[1].status === 'fulfilled' && results[1].value && results[1].value.length > 0) {
                processedRoutes.push(...results[1].value.map(r => ({ ...r, id: `CTB_${r.route}_${r.dest_tc}`, co: 'CTB', last_updated: timestamp })));
            } else {
                processedRoutes.push(...cached.filter(r => r.co === 'CTB'));
            }

            // NLB
            if (results[2].status === 'fulfilled' && results[2].value && results[2].value.length > 0) {
                processedRoutes.push(...results[2].value.map(r => ({ ...r, id: `NLB_${r.route}_${r.routeId}`, co: 'NLB', last_updated: timestamp })));
            } else {
                processedRoutes.push(...cached.filter(r => r.co === 'NLB'));
            }

            if (results.some(r => r.status === 'rejected' || !r.value)) {
                console.warn('Some bus companies failed to sync, retaining cached data.');
            }

            if (processedRoutes.length > 0) {
                const sorted = sortRoutes(processedRoutes);
                await BusDB.clear('routes');
                await BusDB.putAll('routes', sorted);
                allRoutes = sorted;
            } else if (cached.length > 0) {
                allRoutes = sortRoutes(cached);
            }
            loadingOverlay.classList.add('hidden');
        }

        function searchRoutes(query, routes) {
            if (!query) return [];
            return routes.filter(r => r.route.startsWith(query)).slice(0, 50);
        }

        async function swapDirection(current) {
            const routeNo = current.route;
            const company = current.co;
            const serviceType = current.service_type || 1;
            
            // Find potential opposites (must match route and service type)
            let opposites = [];
            if (company === 'KMB') {
                const targetBound = current.bound === 'O' ? 'I' : 'O';
                opposites = allRoutes.filter(v => 
                    v.co === 'KMB' && 
                    v.route === routeNo && 
                    v.bound === targetBound && 
                    (v.service_type || 1) == serviceType
                );
            } else if (company === 'CTB') {
                const targetDir = current.direction === 'outbound' ? 'inbound' : 'outbound';
                // For CTB, we probe the API to verify if the direction exists
                const stops = await BusAPI.fetchCTB(`/route-stop/CTB/${routeNo}/${targetDir}`);
                if (stops && stops.length > 0) {
                    // Reconstruct opposite object
                    opposites = [{
                        ...current,
                        direction: targetDir,
                        dest_tc: current.orig_tc, orig_tc: current.dest_tc,
                        dest_en: current.orig_en, orig_en: current.dest_en
                    }];
                }
            } else if (company === 'NLB') {
                // NLB usually has distinct routeIds for each direction
                opposites = allRoutes.filter(v => v.co === 'NLB' && v.route === routeNo && v.routeId !== current.routeId);
            }

            if (opposites.length === 1) {
                showStops(opposites[0]);
            } else if (opposites.length > 1) {
                // Too many variants, go to selection screen
                selectRoute(current);
            } else {
                alert("No return direction found for this specific service variant.");
            }
        }

        async function removeFavorite(favId) {

        let wasDragged = false;
        
        function handlePointerDown(e, card, f) {
            if (e.target.closest('.remove-btn') || e.target.closest('.fav-star')) return;
            startY = e.clientY;
            const rect = card.getBoundingClientRect();
            wasDragged = false;

            dragTimeout = setTimeout(() => {
                isDragging = true; activeDragCard = card;
                wasDragged = true;
                
                card.style.touchAction = 'none';

                dragPlaceholder = document.createElement('div');
                dragPlaceholder.className = 'drag-placeholder';
                dragPlaceholder.style.height = `${rect.height}px`;
                const container = document.getElementById('favorites-list');
                const containerRect = container.getBoundingClientRect();
                card.classList.add('dragging');
                card.style.width = `${rect.width}px`;
                initialTop = rect.top - containerRect.top;
                card.style.top = `${initialTop}px`;
                card.style.left = `${rect.left - containerRect.left}px`;
                container.insertBefore(dragPlaceholder, card);
            }, 300); // 300ms hold to start drag
            
            activePointerUpHandler = (ev) => handlePointerUp(ev, card, f);
            document.addEventListener('pointermove', handlePointerMove, { passive: false });
            document.addEventListener('pointerup', activePointerUpHandler);
            document.addEventListener('pointercancel', activePointerUpHandler);
        }

        function handlePointerMove(e) {
            if (!isDragging) {
                if (dragTimeout && Math.abs(e.clientY - startY) > 15) { 
                    clearTimeout(dragTimeout); 
                    dragTimeout = null; 
                }
                return;
            }
            
            e.preventDefault(); 
            const deltaY = e.clientY - startY;
            activeDragCard.style.top = `${initialTop + deltaY}px`;
            const container = document.getElementById('favorites-list');
            const afterElement = getDragAfterElement(container, e.clientY);
            if (afterElement == null) { container.appendChild(dragPlaceholder); } else { container.insertBefore(dragPlaceholder, afterElement); }
        }

        function handlePointerUp(e, card, f) {
            document.removeEventListener('pointermove', handlePointerMove);
            document.removeEventListener('pointerup', activePointerUpHandler);
            document.removeEventListener('pointercancel', activePointerUpHandler);
            
            if (dragTimeout) { clearTimeout(dragTimeout); dragTimeout = null; }
            
            if (!isDragging) { 
                return; 
            }
            
            isDragging = false;
            card.style.touchAction = '';
            
            const container = document.getElementById('favorites-list');
            card.classList.remove('dragging');
            card.style.position = ''; card.style.top = ''; card.style.left = ''; card.style.width = '';
            container.insertBefore(card, dragPlaceholder);
            container.removeChild(dragPlaceholder);
            activeDragCard = null; dragPlaceholder = null;
            saveReorderedFavorites();
        }

        async function saveReorderedFavorites() {
            const container = document.getElementById('favorites-list');
            const cards = container.querySelectorAll('.card');
            const favs = await BusDB.getAll('favorites');
            for (let i = 0; i < cards.length; i++) {
                if (cards[i].dataset.favid) {
                    const favId = parseInt(cards[i].dataset.favid, 10);
                    const fav = favs.find(f => f.favId === favId);
                    if (fav) { fav.sortOrder = i; await BusDB.put('favorites', fav); }
                }
            }
        }

        async function renderFavorites() {
            const favs = await BusDB.getAll('favorites');
            favs.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
            _favoriteStopsCache.clear();
            favs.forEach(f => { _favoriteStopsCache.add(`${f.co}-${f.route}-${f.stopId}-${f.serviceType || 1}`); });
            const container = document.getElementById('favorites-list');
            if (favs.length === 0) { container.innerHTML = `<p style="text-align:center;color:#888;">${t('noFavorites')}</p>`; return; }
            container.innerHTML = '';
            favs.forEach(f => {
                const card = document.createElement('div');
                card.className = `card co-${f.co}`;
                card.dataset.favid = f.favId;
                card.addEventListener('pointerdown', (e) => handlePointerDown(e, card, f));
                card.onclick = (e) => {
                    if (wasDragged) return;
                    if (e.target.closest('.remove-btn') || e.target.closest('.fav-star')) return;
                    goToRouteStopsFromFav(f);
                };
                const header = document.createElement('div');
                header.style.display = 'flex'; header.style.justifyContent = 'space-between'; header.style.alignItems = 'flex-start';
                const info = document.createElement('div');
                info.innerHTML = `<div class="route-info"><span class="route-no">${f.route}</span> <span class="dest-name">${f.co}</span></div>
                                 <div class="path-info" style="font-size: 12px; color: #777; margin-bottom: 4px;">${f.path_desc || ''}</div>
                                 <div class="stop-name"><i class="fas fa-map-marker-alt"></i> ${f[`stopName_${userLang}`] || f.stopName_tc || f.stopName}</div>`;
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn'; removeBtn.innerHTML = '<i class="fas fa-trash-can"></i>';
                removeBtn.onclick = (e) => { e.stopPropagation(); if(confirm(t('removeFavorite'))) removeFavorite(f.favId); };
                header.appendChild(info); header.appendChild(removeBtn);
                const etaDiv = document.createElement('div');
                etaDiv.className = 'eta-row';
                etaDiv.innerHTML = `<span><i class="fas fa-clock"></i> ${t('next')}</span><div class="eta-list" id="eta-${f.favId}">${t('loadingStops')}</div>`;
                card.appendChild(header); card.appendChild(etaDiv); container.appendChild(card);
            });
            refreshAllETAs();
        }

        async function refreshAllETAs() {
            const favs = await BusDB.getAll('favorites');
            favs.forEach(f => updateETA(f));
            const btn = document.getElementById('refresh-btn');
            if (btn) { btn.classList.add('fa-spin'); setTimeout(() => btn.classList.remove('fa-spin'), 1000); }
        }

        function getRelativeTime(etaStr) {
            if (!etaStr) return t('scheduled');
            const eta = new Date(etaStr.replace(' ', 'T'));
            const diffMin = Math.floor((eta - new Date()) / 60000);
            return diffMin <= 0 ? `0 ${t('min')}` : `${diffMin} ${t('min')}`;
        }

        async function updateETA(f) {
            try {
                const etaContainer = document.getElementById(`eta-${f.favId}`);
                if (!etaContainer) return;
                const serviceType = f.serviceType || 1;
                const cached = getFlashCache(f.co, f.stopId, f.route, serviceType);
                const render = (etas) => {
                    if (!etas || etas.length === 0) { etaContainer.textContent = t('noETA'); return; }
                    const formattedEtas = etas.slice(0, 3).map(item => getRelativeTime(f.co === 'NLB' ? item.estimatedArrivalTime : item.eta));
                    etaContainer.innerHTML = '';
                    formattedEtas.forEach((time, index) => {
                        const span = document.createElement('span'); span.textContent = time; etaContainer.appendChild(span);
                        if (index < formattedEtas.length - 1) etaContainer.appendChild(document.createTextNode(', '));
                    });
                };
                if (cached) render(cached);
                const etas = await BusAPI.getETA(f.co, f.stopId, f.route, serviceType, f.routeId, f.bound, f.direction);
                if (etas !== null) {
                    setFlashCache(f.co, f.stopId, f.route, serviceType, etas);
                    render(etas);
                }
            } catch (e) { console.error('Error fetching ETA', e); }
        }

        function toggleETADrawer(card, r, s) {
            const drawer = card.querySelector('.eta-drawer');
            const isOpen = drawer.classList.contains('open');
            if (_drawerInterval) { clearInterval(_drawerInterval); _drawerInterval = null; }
            document.querySelectorAll('.eta-drawer.open').forEach(d => { if (d !== drawer) d.classList.remove('open'); });
            drawer.classList.toggle('open', !isOpen);
            if (drawer.classList.contains('open')) {
                updateDrawerETA(drawer, r, s);
                _drawerInterval = setInterval(() => updateDrawerETA(drawer, r, s), 30000);
            }
        }

        const _drawerFetching = new Set();

        async function updateDrawerETA(drawer, r, s, isManual = false) {
            const content = drawer.querySelector('.eta-content');
            const status = drawer.querySelector('.eta-status');
            const serviceType = r.service_type || 1;
            const cooldownKey = `${r.co}-${s.stop}-${r.route}-${serviceType}`;

            // 1. Prevent overlapping requests
            if (_drawerFetching.has(cooldownKey)) return;

            // 2. Check cooldown for manual requests
            if (isManual) {
                const lastRefresh = _stationRefreshCooldowns.get(cooldownKey) || 0;
                if (Date.now() - lastRefresh < 5000) {
                    return; // Still in cooldown
                }
            }

            _drawerFetching.add(cooldownKey);
            
            try {
                // If manual, start spinning the existing icon immediately
                if (isManual) {
                    const existingIcon = status.querySelector('.fa-sync-alt');
                    if (existingIcon) existingIcon.classList.add('fa-spin');
                }

                const cached = getFlashCache(r.co, s.stop, r.route, serviceType);
                const render = (etas) => {
                    if (!etas || etas.length === 0) { content.textContent = t('noETA'); return; }
                    
                    // Visual feedback for content update
                    content.style.opacity = '0.5';
                    content.style.transition = 'opacity 0.2s';
                    
                    setTimeout(() => {
                        content.innerHTML = '';
                        etas.slice(0, 3).forEach(item => {
                            const row = document.createElement('div'); row.style.display = 'flex'; row.style.justifyContent = 'space-between'; row.style.marginBottom = '4px';
                            const timeStr = getRelativeTime(r.co === 'NLB' ? item.estimatedArrivalTime : item.eta);
                            const timeSpan = document.createElement('span'); timeSpan.textContent = timeStr; timeSpan.style.fontWeight = 'bold';
                            const remarkSpan = document.createElement('span'); remarkSpan.textContent = localized(item, 'rmk') || '';
                            remarkSpan.style.fontSize = '12px'; remarkSpan.style.color = '#777';
                            row.appendChild(timeSpan); row.appendChild(remarkSpan); content.appendChild(row);
                        });
                        content.style.opacity = '1';
                    }, 50);

                    const refreshIcon = document.createElement('i');
                    refreshIcon.className = 'fas fa-sync-alt';
                    refreshIcon.style.cursor = 'pointer';
                    refreshIcon.style.marginLeft = '8px';
                    refreshIcon.style.transition = 'opacity 0.3s';
                    
                    refreshIcon.onclick = (e) => {
                        e.stopPropagation();
                        updateDrawerETA(drawer, r, s, true);
                    };

                    // Handle visual dimming state
                    const lastRefresh = _stationRefreshCooldowns.get(cooldownKey) || 0;
                    const timeSinceRefresh = Date.now() - lastRefresh;
                    if (timeSinceRefresh < 5000) {
                        refreshIcon.style.opacity = '0.3';
                        refreshIcon.style.cursor = 'not-allowed';
                        setTimeout(() => {
                            // Only reset if this icon is still the one in the DOM
                            if (status.contains(refreshIcon)) {
                                refreshIcon.style.opacity = '1';
                                refreshIcon.style.cursor = 'pointer';
                            }
                        }, 5000 - timeSinceRefresh);
                    }

                    status.innerHTML = '';
                    status.textContent = `${t('lastUpdated')} ${new Date().toLocaleTimeString()}`;
                    status.appendChild(refreshIcon);
                };

                if (cached) { render(cached); } else { content.textContent = t('loadingStops'); }

                const etas = await BusAPI.getETA(r.co, s.stop, r.route, serviceType, r.routeId, r.bound, r.direction);
                if (etas !== null) {
                    setFlashCache(r.co, s.stop, r.route, serviceType, etas);
                    render(etas);
                }
            } catch (error) { 
                console.error('Error updating drawer ETA:', error); 
            } finally {
                _drawerFetching.delete(cooldownKey);
                if (isManual) {
                    const now = Date.now();
                    _stationRefreshCooldowns.set(cooldownKey, now);
                    
                    // Visual feedback completion
                    setTimeout(() => {
                        const icon = status.querySelector('.fa-sync-alt');
                        if (icon) {
                            icon.classList.remove('fa-spin');
                            icon.style.opacity = '0.3';
                            icon.style.cursor = 'not-allowed';
                            
                            // Schedule the UN-DIM here
                            setTimeout(() => {
                                // Check if this icon is still in the DOM and still has this specific cooldown
                                if (status.contains(icon) && _stationRefreshCooldowns.get(cooldownKey) === now) {
                                    icon.style.opacity = '1';
                                    icon.style.cursor = 'pointer';
                                }
                            }, 5000);
                        }
                    }, 500);
                }
            }
        }

        async function handleFavoriteClick(star, r, s) {
            const serviceType = r.service_type || 1;
            const cacheKey = `${r.co}-${r.route}-${s.stop}-${serviceType}`;
            const isFav = _favoriteStopsCache.has(cacheKey);
            if (isFav) {
                _favoriteStopsCache.delete(cacheKey); star.classList.remove('active'); star.innerHTML = '<i class="far fa-star"></i>';
                const favs = await BusDB.getAll('favorites');
                const f = favs.find(f => f.co === r.co && f.stopId === s.stop && f.route === r.route && (f.serviceType || 1) === serviceType);
                if (f) await BusDB.delete('favorites', f.favId);
            } else {
                _favoriteStopsCache.add(cacheKey); star.classList.add('active'); star.innerHTML = '<i class="fas fa-star"></i>';
                await saveFavorite(r, s, true); 
            }
        }

        async function migrateFavorites() {
            const oldFavsJson = localStorage.getItem('bus_favs');
            if (oldFavsJson) {
                try {
                    const oldFavs = JSON.parse(oldFavsJson);
                    const toPut = oldFavs.map(f => {
                        if (!f.path_desc) f.path_desc = '';
                        if (!f.groupId) f.groupId = 1;
                        return f;
                    });
                    if (toPut.length > 0) {
                        await BusDB.putAll('favorites', toPut);
                    }
                    localStorage.removeItem('bus_favs');
                } catch (e) { console.error('Migration failed', e); }
            }
        }

        setInterval(() => { refreshAllETAs(); }, 60000);
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                await BusDB.init(); 
                await migrateFavorites(); 
                await syncRoutes(); 
            } catch (e) {
                console.error("App initialization failed", e);
            } finally {
                const loadingOverlay = document.getElementById('initial-loading');
                if (loadingOverlay) loadingOverlay.classList.add('hidden');
                renderFavorites();
            }
        });

        let headerTapCount = 0;
        let lastHeaderTapTime = 0;

        document.querySelector('header h1').addEventListener('click', () => {
            const now = Date.now();
            if (now - lastHeaderTapTime > 500) {
                headerTapCount = 1;
            } else {
                headerTapCount++;
            }
            lastHeaderTapTime = now;

            if (headerTapCount === 10) {
                headerTapCount = 0;
                DebugLogger.toggle(true);
            }
        });
    </script>
    <div id="debug-console" class="hidden">
        <div id="debug-header">
            <span><i class="fas fa-terminal"></i> Debug Console</span>
            <div id="debug-controls">
                <button onclick="DebugLogger.clear()">Clear</button>
                <button onclick="DebugLogger.toggle(false)">Close</button>
            </div>
        </div>
        <div id="debug-logs"></div>
    </div>
</body>
</html>
