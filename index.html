<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HK Bus Arrivals</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --kmb-red: #d32f2f;
            --ctb-blue: #00529b;
            --ctb-yellow: #ffdf00;
            --nlb-green: #2e7d32;
            --bg-color: #f4f4f9;
            --card-bg: #ffffff;
            --text-main: #333;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; background: var(--bg-color); color: var(--text-main); }
        .container { max-width: 600px; margin: 0 auto; padding: 15px; }
        header { background: var(--kmb-red); color: white; padding: 15px; text-align: center; border-radius: 0 0 10px 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        header h1 { margin: 0; font-size: 24px; }
        .section { margin-bottom: 25px; }
        h2 { font-size: 20px; margin-bottom: 15px; display: flex; align-items: center; gap: 10px; }
        .card { background: var(--card-bg); padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 12px; cursor: pointer; position: relative; transition: transform 0.1s; }
        .card:active { transform: scale(0.98); }
        .card.co-KMB { border-left: 5px solid var(--kmb-red); }
        .card.co-CTB { border-left: 5px solid var(--ctb-yellow); }
        .card.co-NLB { border-left: 5px solid var(--nlb-green); }
        
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; margin-bottom: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: #ddd; border-radius: 5px; cursor: pointer; border: none; font-size: inherit; font-family: inherit; font-weight: bold; }
        .tab.active { background: var(--kmb-red); color: white; }
        .hidden { display: none; }
        
        .eta-row { display: flex; justify-content: space-between; align-items: center; margin-top: 10px; }
        .eta-list { display: flex; gap: 8px; font-weight: bold; color: var(--kmb-red); }
        .co-NLB .eta-list { color: var(--nlb-green); }
        .co-CTB .eta-list { color: var(--ctb-blue); }
        
        .remove-btn { background: none; border: none; color: #999; cursor: pointer; font-size: 18px; padding: 5px; transition: color 0.2s; }
        .remove-btn:hover { color: #ff4444; }
        
        .route-info { display: flex; align-items: baseline; gap: 8px; }
        .route-no { font-size: 18px; font-weight: 800; }
        .dest-name { color: #666; font-size: 14px; }
        .stop-name { font-size: 14px; margin-top: 4px; color: #444; }

        .results-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
        .back-btn { background: none; border: none; color: var(--kmb-red); cursor: pointer; font-size: 16px; font-weight: bold; padding: 5px 0; }

        .station-card { display: flex; flex-direction: column; padding: 0 !important; }
        .station-main { display: flex; align-items: center; padding: 15px; width: 100%; box-sizing: border-box; }
        .station-info { flex-grow: 1; }
        .fav-star { font-size: 20px; color: #ccc; padding: 10px; cursor: pointer; transition: color 0.2s; }
        .fav-star.active { color: #ffc107; }

        .eta-drawer { 
            max-height: 0; 
            overflow: hidden; 
            transition: max-height 0.3s ease-out; 
            background: #f9f9f9; 
            border-top: 1px solid #eee;
        }
        .eta-drawer.open { max-height: 200px; padding: 10px 15px; }
        .eta-content { font-size: 14px; }
        .eta-status { font-size: 11px; color: #999; margin-top: 5px; }

        .card.dragging {
            opacity: 0.8;
            transform: scale(1.02);
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            position: absolute;
            z-index: 1000;
            pointer-events: none; /* Let pointer events pass through to elements below */
            margin: 0;
        }
        .drag-placeholder {
            background: transparent;
            border: 2px dashed #ccc;
            border-radius: 8px;
            margin-bottom: 12px;
            box-sizing: border-box;
        }
        #favorites-list {
            position: relative; /* Context for absolute positioning of dragging card */
            touch-action: none; /* Prevent scrolling while dragging on mobile */
        }
    </style>
</head>
<body>
    <header><h1><i class="fas fa-bus"></i> HK Bus Arrivals</h1></header>
    <div class="container">
        <div id="favorites-section" class="section">
            <h2 style="justify-content: space-between;">
                <span><i class="fas fa-star" style="color: #ffc107;"></i> Favorites</span>
                <i class="fas fa-sync-alt" id="refresh-btn" style="cursor: pointer; font-size: 18px; color: #666;" onclick="refreshAllETAs()" title="Refresh ETAs"></i>
            </h2>
            <div id="favorites-list"></div>
        </div>
        <div class="section">
            <div class="tabs">
                <button class="tab active" onclick="switchTab(event, 'route')"><i class="fas fa-search"></i> Route</button>
                <button class="tab" onclick="switchTab(event, 'stop')"><i class="fas fa-map-marker-alt"></i> Stop</button>
            </div>
            <div id="route-search-ui">
                <div id="search-input-area" style="display: flex; gap: 10px; align-items: flex-start;">
                    <input type="text" id="route-input" placeholder="Enter Route (e.g. 1A, 962X, 3M)...">
                    <button onclick="syncRoutes(true)" class="tab" style="flex: 0 0 auto; width: auto; padding: 12px;" title="Refresh Route Cache">
                        <i class="fas fa-sync"></i>
                    </button>
                </div>
                <div id="route-results" class="results-list"></div>
                <div id="stop-selection-results" class="results-list hidden"></div>
            </div>
            <div id="stop-search-ui" class="hidden">
                <input type="text" id="stop-input" placeholder="Enter Stop Name...">
                <div id="stop-results" class="results-list"></div>
            </div>
        </div>
    <script>
        const _etaFlashCache = new Map();
        const FLASH_CACHE_TTL = 5 * 60 * 1000; // 5 minutes
        let _drawerInterval = null;

        let activeDragCard = null;
        let dragPlaceholder = null;
        let startY = 0;
        let initialTop = 0;
        let dragTimeout = null;
        let isDragging = false;

        function getDragAfterElement(container, y) {
            const draggableElements = [...container.querySelectorAll('.card:not(.dragging)')];
            
            return draggableElements.reduce((closest, child) => {
                const box = child.getBoundingClientRect();
                const offset = y - box.top - box.height / 2;
                if (offset < 0 && offset > closest.offset) {
                    return { offset: offset, element: child };
                } else {
                    return closest;
                }
            }, { offset: Number.NEGATIVE_INFINITY }).element;
        }

        const _favoriteStopsCache = new Set();
        function _isFavorited(r, s) {
            const serviceType = r.service_type || 1;
            const id = `${r.co}-${r.route}-${s.stop}-${serviceType}`;
            return _favoriteStopsCache.has(id);
        }

        function getFlashCache(co, stopId, route, serviceType) {
            const key = `${co}-${stopId}-${route}-${serviceType || 1}`;
            const cached = _etaFlashCache.get(key);
            if (cached && (Date.now() - cached.timestamp < FLASH_CACHE_TTL)) {
                return cached.data;
            }
            return null;
        }

        function setFlashCache(co, stopId, route, serviceType, data) {
            const key = `${co}-${stopId}-${route}-${serviceType || 1}`;
            _etaFlashCache.set(key, { data, timestamp: Date.now() });
        }

        const BusDB = {
            DB_NAME: 'HKBusDB',
            DB_VERSION: 1,
            db: null,

            async init() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(this.DB_NAME, this.DB_VERSION);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains('routes')) {
                            db.createObjectStore('routes', { keyPath: 'id' });
                        }
                        if (!db.objectStoreNames.contains('favorites')) {
                            db.createObjectStore('favorites', { keyPath: 'favId', autoIncrement: true });
                        }
                    };
                    request.onsuccess = (e) => {
                        this.db = e.target.result;
                        resolve();
                    };
                    request.onerror = (e) => reject(e.target.error);
                });
            },

            async put(storeName, data) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    store.put(data);
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            },

            async getAll(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readonly');
                    const store = tx.objectStore(storeName);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = (e) => reject(e.target.error);
                });
            },

            async clear(storeName) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    store.clear();
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            },

            async putAll(storeName, dataArray) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    dataArray.forEach(item => store.put(item));
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            },

            async delete(storeName, key) {
                return new Promise((resolve, reject) => {
                    const tx = this.db.transaction(storeName, 'readwrite');
                    const store = tx.objectStore(storeName);
                    store.delete(key);
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            }
        };

        const BusAPI = {
            KMB_BASE: 'https://data.etabus.gov.hk/v1/transport/kmb',
            CTB_BASE: 'https://rt.data.gov.hk/v2/transport/citybus',
            NLB_BASE: 'https://rt.data.gov.hk/v2/transport/nlb',
            _ctbStopCache: new Map(),
            _kmbStopCache: new Map(),

            async getKMBStops() {
                if (this._kmbStopCache.size === 0) {
                    const data = await this.fetchKMB('/stop');
                    if (data) {
                        data.forEach(s => this._kmbStopCache.set(s.stop, s));
                    }
                }
                return this._kmbStopCache;
            },

            async getCTBStops() {
                return this._ctbStopCache;
            },
            
            async fetchKMB(endpoint) {
                try {
                    const res = await fetch(`${this.KMB_BASE}${endpoint}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const json = await res.json();
                    return json.data;
                } catch (e) {
                    console.error('KMB Fetch Error:', e);
                    return null;
                }
            },
            
            async fetchCTB(endpoint) {
                try {
                    const res = await fetch(`${this.CTB_BASE}${endpoint}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const json = await res.json();
                    return json.data;
                } catch (e) {
                    console.error('CTB Fetch Error:', e);
                    return null;
                }
            },

            async getCTBStopInfo(stopId) {
                if (!stopId) return null;
                const stops = await this.getCTBStops();
                if (stops.has(stopId)) return stops.get(stopId);
                
                try {
                    const res = await fetch(`${this.CTB_BASE}/stop/${stopId}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    const json = await res.json();
                    const data = json.data;
                    if (data) {
                        stops.set(stopId, data);
                        return data;
                    }
                    return null;
                } catch (e) {
                    console.error('Error fetching CTB stop', stopId, e);
                    return null;
                }
            },

            async fetchNLB(endpoint) {
                try {
                    const res = await fetch(`${this.NLB_BASE}/${endpoint}`);
                    if (!res.ok) throw new Error(`HTTP ${res.status}`);
                    return await res.json();
                } catch (e) {
                    console.error('NLB Fetch Error:', e);
                    return null;
                }
            },

            async getRouteList(company) {
                if (company === 'KMB') return this.fetchKMB('/route/');
                if (company === 'CTB') return this.fetchCTB('/route/CTB');
                if (company === 'NLB') {
                    const data = await this.fetchNLB('route.php?action=list');
                    if (!data || !data.routes) return [];
                    return data.routes.map(r => ({
                        route: r.routeNo,
                        dest_tc: r.routeName_c,
                        routeId: r.routeId
                    }));
                }
            },

            async getStops(company, route, direction, serviceType, routeId) {
                if (company === 'KMB') {
                    const dir = direction === 'outbound' ? 'outbound' : 'inbound';
                    const stops = await this.fetchKMB(`/route-stop/${route}/${dir}/${serviceType || 1}`);
                    if (!stops) return [];
                    const allStops = await this.getKMBStops();
                    return stops.map(s => {
                        const info = allStops.get(s.stop);
                        return { 
                            stop: s.stop, 
                            name_tc: info ? info.name_tc : s.stop, 
                            name_en: info ? info.name_en : s.stop 
                        };
                    });
                }
                if (company === 'CTB') {
                    const dir = direction === 'outbound' ? 'outbound' : 'inbound';
                    const stops = await this.fetchCTB(`/route-stop/CTB/${route}/${dir}`);
                    if (!stops) return [];
                    // Fetch stop names for CTB
                    const stopData = await Promise.all(stops.map(async s => {
                        const info = await this.getCTBStopInfo(s.stop);
                        if (!info) return null;
                        return { 
                            stop: s.stop, 
                            name_tc: info.name_tc, 
                            name_en: info.name_en 
                        };
                    }));
                    return stopData.filter(s => s !== null);
                }
                if (company === 'NLB') {
                    const data = await this.fetchNLB(`stop.php?action=list&routeId=${routeId}`);
                    if (!data || !data.stops) return [];
                    return data.stops.map(s => ({
                        stop: s.stopId,
                        name_tc: s.stopName_c,
                        name_en: s.stopName_e
                    }));
                }
            },

            async getETA(company, stopId, route, serviceType = 1, routeId) {
                if (company === 'KMB') return this.fetchKMB(`/eta/${stopId}/${route}/${serviceType}`);
                if (company === 'CTB') return this.fetchCTB(`/eta/CTB/${stopId}/${route}`);
                if (company === 'NLB') {
                    const data = await this.fetchNLB(`stop.php?action=estimatedArrivals&routeId=${routeId}&stopId=${stopId}`);
                    if (!data || !data.estimatedArrivals) return [];
                    return data.estimatedArrivals;
                }
            }
        };

        function switchTab(event, type) {
            if (_drawerInterval) {
                clearInterval(_drawerInterval);
                _drawerInterval = null;
            }
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById('route-search-ui').classList.toggle('hidden', type !== 'route');
            document.getElementById('stop-search-ui').classList.toggle('hidden', type !== 'stop');
            if (type === 'route') {
                document.getElementById('search-input-area').classList.remove('hidden');
                document.getElementById('route-results').classList.remove('hidden');
                document.getElementById('stop-selection-results').classList.add('hidden');
            }
        }

        let allRoutes = [];

        function sortRoutes(routes) {
            return routes.sort((a, b) => {
                // Alphanumeric sort for route numbers
                const res = a.route.localeCompare(b.route, undefined, { numeric: true, sensitivity: 'base' });
                if (res !== 0) return res;
                return a.co.localeCompare(b.co);
            });
        }

        async function syncRoutes(force = false) {
            const cached = await BusDB.getAll('routes');
            const now = Date.now();
            const SEVEN_DAYS = 7 * 24 * 60 * 60 * 1000;

            if (!force && cached.length > 0 && (now - (cached[0].last_updated || 0) < SEVEN_DAYS)) {
                allRoutes = sortRoutes(cached);
                return;
            }

            console.log('Syncing routes from API...');
            const results = await Promise.allSettled([
                BusAPI.getRouteList('KMB'),
                BusAPI.getRouteList('CTB'),
                BusAPI.getRouteList('NLB')
            ]);

            const kmb = (results[0].status === 'fulfilled' && results[0].value) ? results[0].value : [];
            const ctb = (results[1].status === 'fulfilled' && results[1].value) ? results[1].value : [];
            const nlb = (results[2].status === 'fulfilled' && results[2].value) ? results[2].value : [];

            if (results.some(r => r.status === 'rejected')) {
                console.warn('Some bus companies failed to sync:', results.filter(r => r.status === 'rejected').map(r => r.reason));
            }

            const timestamp = Date.now();
            const processedRoutes = [
                ...kmb.map(r => ({ ...r, id: `KMB_${r.route}_${r.bound}_${r.service_type}`, co: 'KMB', last_updated: timestamp })),
                ...ctb.map(r => ({ ...r, id: `CTB_${r.route}_${r.dest_tc}`, co: 'CTB', last_updated: timestamp })),
                ...nlb.map(r => ({ ...r, id: `NLB_${r.route}_${r.routeId}`, co: 'NLB', last_updated: timestamp }))
            ];

            if (processedRoutes.length > 0) {
                const sorted = sortRoutes(processedRoutes);
                await BusDB.clear('routes');
                await BusDB.putAll('routes', sorted);
                allRoutes = sorted;
            } else if (cached.length > 0) {
                allRoutes = sortRoutes(cached);
            }
        }

        function searchRoutes(query, routes) {
            if (!query) return [];
            return routes.filter(r => r.route.startsWith(query)).slice(0, 10);
        }

        document.getElementById('route-input').addEventListener('input', e => {
            const val = e.target.value.toUpperCase();
            const matches = searchRoutes(val, allRoutes);
            renderRouteResults(matches);
        });

        function renderRouteResults(routes) {
            const container = document.getElementById('route-results');
            container.innerHTML = '';
            routes.forEach(r => {
                const card = document.createElement('div');
                card.className = `card co-${r.co}`;
                card.onclick = () => selectRoute(r);
                
                const info = document.createElement('div');
                info.className = 'route-info';
                
                const strong = document.createElement('span');
                strong.className = 'route-no';
                strong.textContent = r.route;
                
                const dest = document.createElement('span');
                dest.className = 'dest-name';
                dest.textContent = `to ${r.dest_tc}`;
                
                const coTag = document.createElement('small');
                coTag.style.marginLeft = 'auto';
                coTag.textContent = r.co;
                
                info.appendChild(strong);
                info.appendChild(dest);
                info.appendChild(coTag);
                card.appendChild(info);
                
                container.appendChild(card);
            });
        }

        async function selectRoute(r) {
            const inputArea = document.getElementById('search-input-area');
            const routeResults = document.getElementById('route-results');
            const favSection = document.getElementById('favorites-section');
            const stopResults = document.getElementById('stop-selection-results');

            inputArea.classList.add('hidden');
            routeResults.classList.add('hidden');
            favSection.classList.add('hidden');
            stopResults.classList.remove('hidden');
            stopResults.innerHTML = '<p style="text-align:center;">Loading directions...</p>';

            try {
                const header = document.createElement('div');
                header.className = 'results-header';
                header.innerHTML = `<button class="back-btn" onclick="showHome()"><i class="fas fa-arrow-left"></i> Back</button>
                                   <span style="font-weight:bold;">${r.route} (${r.co})</span>`;
                
                const container = document.createElement('div');
                
                if (r.co === 'KMB') {
                    const variants = allRoutes.filter(v => v.co === 'KMB' && v.route === r.route);
                    variants.forEach(v => {
                        const card = document.createElement('div');
                        card.className = 'card co-KMB';
                        card.innerHTML = `To ${v.dest_tc} <small>(${v.bound === 'O' ? 'Outbound' : 'Inbound'})</small>`;
                        card.onclick = () => showStops(v);
                        container.appendChild(card);
                    });
                } else if (r.co === 'CTB') {
                    // Outbound
                    const d1 = document.createElement('div');
                    d1.className = 'card co-CTB';
                    d1.innerHTML = `To ${r.dest_tc} <small>(Outbound)</small>`;
                    d1.onclick = () => showStops({...r, direction: 'outbound'});
                    container.appendChild(d1);
                    // Inbound
                    const d2 = document.createElement('div');
                    d2.className = 'card co-CTB';
                    d2.innerHTML = `To ${r.orig_tc} <small>(Inbound)</small>`;
                    d2.onclick = () => showStops({...r, direction: 'inbound', dest_tc: r.orig_tc, orig_tc: r.dest_tc});
                    container.appendChild(d2);
                } else if (r.co === 'NLB') {
                    const variants = allRoutes.filter(v => v.co === 'NLB' && v.route === r.route);
                    variants.forEach(v => {
                        const card = document.createElement('div');
                        card.className = 'card co-NLB';
                        card.innerHTML = `${v.dest_tc}`;
                        card.onclick = () => showStops(v);
                        container.appendChild(card);
                    });
                }
                
                stopResults.innerHTML = '';
                stopResults.appendChild(header);
                stopResults.appendChild(container);

            } catch (error) {
                console.error('Error showing directions:', error);
                stopResults.innerHTML = '<p style="text-align:center;color:red;">Failed to load directions.</p>';
            }
        }

        async function showStops(r) {
            const stopResults = document.getElementById('stop-selection-results');
            stopResults.innerHTML = '<p style="text-align:center;">Loading stops...</p>';

            try {
                const direction = (r.co === 'KMB') ? (r.bound === 'O' ? 'outbound' : 'inbound') : (r.direction || 'outbound');
                const stops = await BusAPI.getStops(r.co, r.route, direction, r.service_type, r.routeId);
                
                stopResults.innerHTML = '';
                const header = document.createElement('div');
                header.className = 'results-header';
                header.innerHTML = `<button class="back-btn" onclick="showHome()"><i class="fas fa-arrow-left"></i> Back</button>
                                   <span style="font-weight:bold;">${r.route} to ${r.dest_tc}</span>`;
                stopResults.appendChild(header);

                stops.forEach(s => {
                    const card = document.createElement('div');
                    card.className = `card station-card co-${r.co}`;
                    card.dataset.stopId = s.stop;

                    const main = document.createElement('div');
                    main.className = 'station-main';
                    main.onclick = () => toggleETADrawer(card, r, s);

                    const info = document.createElement('div');
                    info.className = 'station-info';
                    info.innerHTML = `<div class="stop-name">${s.name_tc}</div><div class="dest-name">${s.name_en}</div>`;

                    const star = document.createElement('div');
                    star.className = `fav-star ${_isFavorited(r, s) ? 'active' : ''}`;
                    star.innerHTML = `<i class="${_isFavorited(r, s) ? 'fas' : 'far'} fa-star"></i>`;
                    star.onclick = (e) => {
                        e.stopPropagation();
                        handleFavoriteClick(star, r, s);
                    };

                    const drawer = document.createElement('div');
                    drawer.className = 'eta-drawer';
                    drawer.innerHTML = `<div class="eta-content">Loading...</div><div class="eta-status"></div>`;

                    main.appendChild(info);
                    main.appendChild(star);
                    card.appendChild(main);
                    card.appendChild(drawer);
                    stopResults.appendChild(card);
                });
            } catch (error) {
                console.error('Error fetching stops:', error);
                stopResults.innerHTML = '<p style="text-align:center;color:red;">Failed to load stops.</p>';
            }
        }

        function showHome() {
            if (_drawerInterval) {
                clearInterval(_drawerInterval);
                _drawerInterval = null;
            }
            document.getElementById('search-input-area').classList.remove('hidden');
            document.getElementById('route-results').classList.remove('hidden');
            document.getElementById('favorites-section').classList.remove('hidden');
            document.getElementById('stop-selection-results').classList.add('hidden');
            renderFavorites();
        }

        async function goToRouteStopsFromFav(f) {
            const inputArea = document.getElementById('search-input-area');
            const routeResults = document.getElementById('route-results');
            const favSection = document.getElementById('favorites-section');
            const stopResults = document.getElementById('stop-selection-results');

            inputArea.classList.add('hidden');
            routeResults.classList.add('hidden');
            favSection.classList.add('hidden');
            stopResults.classList.remove('hidden');

            // Reconstruct route object for showStops
            const r = {
                co: f.co,
                route: f.route,
                service_type: f.serviceType || 1,
                routeId: f.routeId,
                bound: f.bound || 'O',
                direction: f.direction || (f.bound === 'O' ? 'outbound' : 'inbound'),
                orig_tc: f.orig_tc,
                dest_tc: f.dest_tc,
                path_desc: f.path_desc
            };

            // Fallback for legacy favorites
            if (!r.orig_tc && f.path_desc) {
                const parts = f.path_desc.split(' ↔ ');
                r.orig_tc = parts[0] || '';
                r.dest_tc = parts[1] || parts[0] || '';
            }

            showStops(r);
        }

        async function saveFavorite(r, s, skipHome = false) {
            // Priority: r.path_desc -> calculated path -> r.dest_tc
            const path_desc = r.path_desc || (r.orig_tc ? `${r.orig_tc} ↔ ${r.dest_tc}` : r.dest_tc);
            
            const fav = {
                co: r.co,
                stopId: s.stop,
                route: r.route,
                stopName: s.name_tc,
                routeId: r.routeId,
                serviceType: r.service_type || 1,
                bound: r.bound,
                direction: r.direction,
                orig_tc: r.orig_tc,
                dest_tc: r.dest_tc,
                path_desc: path_desc,
                sortOrder: Date.now()
            };
            
            const favs = await BusDB.getAll('favorites');
            if (!favs.find(f => f.co === fav.co && f.stopId === fav.stopId && f.route === fav.route && f.serviceType === fav.serviceType)) {
                await BusDB.put('favorites', fav);
                const serviceType = fav.serviceType || 1;
                _favoriteStopsCache.add(`${fav.co}-${fav.route}-${fav.stopId}-${serviceType}`);
            }
            if (!skipHome) showHome();
        }

        async function removeFavorite(favId) {
            await BusDB.delete('favorites', favId);
            renderFavorites();
        }

        async function renderFavorites() {
            const favs = await BusDB.getAll('favorites');
            favs.sort((a, b) => (a.sortOrder || 0) - (b.sortOrder || 0));
            
            _favoriteStopsCache.clear();
            favs.forEach(f => {
                const serviceType = f.serviceType || 1;
                _favoriteStopsCache.add(`${f.co}-${f.route}-${f.stopId}-${serviceType}`);
            });

            const container = document.getElementById('favorites-list');
            if (favs.length === 0) {
                container.innerHTML = '<p style="text-align:center;color:#888;">No favorites yet. Search a route to add one!</p>';
                return;
            }
            container.innerHTML = '';
            favs.forEach(f => {
                const card = document.createElement('div');
                card.className = `card co-${f.co}`;
                card.onclick = () => goToRouteStopsFromFav(f);
                
                const header = document.createElement('div');
                header.style.display = 'flex';
                header.style.justifyContent = 'space-between';
                header.style.alignItems = 'flex-start';

                const info = document.createElement('div');
                info.innerHTML = `<div class="route-info"><span class="route-no">${f.route}</span> <span class="dest-name">${f.co}</span></div>
                                 <div class="path-info" style="font-size: 12px; color: #777; margin-bottom: 4px;">${f.path_desc || ''}</div>
                                 <div class="stop-name"><i class="fas fa-map-marker-alt"></i> ${f.stopName}</div>`;
                
                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.innerHTML = '<i class="fas fa-trash-can"></i>';
                removeBtn.onclick = (e) => {
                    e.stopPropagation();
                    if(confirm('Remove this favorite?')) removeFavorite(f.favId);
                };

                header.appendChild(info);
                header.appendChild(removeBtn);

                const etaDiv = document.createElement('div');
                etaDiv.className = 'eta-row';
                etaDiv.innerHTML = `<span><i class="fas fa-clock"></i> Next:</span><div class="eta-list" id="eta-${f.favId}">Loading...</div>`;
                
                card.appendChild(header);
                card.appendChild(etaDiv);
                container.appendChild(card);
            });
            refreshAllETAs();
        }

        async function refreshAllETAs() {
            const favs = await BusDB.getAll('favorites');
            favs.forEach(f => updateETA(f));
            const btn = document.getElementById('refresh-btn');
            if (btn) {
                btn.classList.add('fa-spin');
                setTimeout(() => btn.classList.remove('fa-spin'), 1000);
            }
        }

        function getRelativeTime(etaStr) {
            if (!etaStr) return 'Scheduled';
            const eta = new Date(etaStr.replace(' ', 'T'));
            const diffMin = Math.floor((eta - new Date()) / 60000);
            return diffMin <= 0 ? '0 min' : `${diffMin} min`;
        }

        async function updateETA(f) {
            try {
                const etaContainer = document.getElementById(`eta-${f.favId}`);
                if (!etaContainer) return;

                const serviceType = f.serviceType || 1;
                const cached = getFlashCache(f.co, f.stopId, f.route, serviceType);
                
                const render = (etas) => {
                    if (!etas || etas.length === 0) {
                        etaContainer.textContent = 'No ETA';
                        return;
                    }
                    const formattedEtas = etas.slice(0, 3).map(item => {
                        return getRelativeTime(f.co === 'NLB' ? item.estimatedArrivalTime : item.eta);
                    });
                    etaContainer.innerHTML = '';
                    formattedEtas.forEach((time, index) => {
                        const span = document.createElement('span');
                        span.textContent = time;
                        etaContainer.appendChild(span);
                        if (index < formattedEtas.length - 1) {
                            etaContainer.appendChild(document.createTextNode(', '));
                        }
                    });
                };

                if (cached) render(cached);

                const etas = await BusAPI.getETA(f.co, f.stopId, f.route, serviceType, f.routeId);
                setFlashCache(f.co, f.stopId, f.route, serviceType, etas);
                render(etas);
            } catch (e) {
                console.error('Error fetching ETA', e);
                const etaContainer = document.getElementById(`eta-${f.favId}`);
                if (etaContainer) etaContainer.textContent = 'Error';
            }
        }

        function toggleETADrawer(card, r, s) {
            const drawer = card.querySelector('.eta-drawer');
            const isOpen = drawer.classList.contains('open');

            if (_drawerInterval) {
                clearInterval(_drawerInterval);
                _drawerInterval = null;
            }

            // Close all other drawers
            document.querySelectorAll('.eta-drawer.open').forEach(d => {
                if (d !== drawer) d.classList.remove('open');
            });

            drawer.classList.toggle('open', !isOpen);
            if (drawer.classList.contains('open')) {
                updateDrawerETA(drawer, r, s);
                _drawerInterval = setInterval(() => updateDrawerETA(drawer, r, s), 30000);
            }
        }

        async function updateDrawerETA(drawer, r, s) {
            const content = drawer.querySelector('.eta-content');
            const status = drawer.querySelector('.eta-status');
            
            try {
                const serviceType = r.service_type || 1;
                const cached = getFlashCache(r.co, s.stop, r.route, serviceType);

                const render = (etas) => {
                    if (!etas || etas.length === 0) {
                        content.textContent = 'No ETA available';
                        return;
                    }
                    content.innerHTML = '';
                    etas.slice(0, 3).forEach(item => {
                        const row = document.createElement('div');
                        row.style.display = 'flex';
                        row.style.justifyContent = 'space-between';
                        row.style.marginBottom = '4px';

                        const timeStr = getRelativeTime(r.co === 'NLB' ? item.estimatedArrivalTime : item.eta);

                        const timeSpan = document.createElement('span');
                        timeSpan.textContent = timeStr;
                        timeSpan.style.fontWeight = 'bold';

                        const remarkSpan = document.createElement('span');
                        remarkSpan.textContent = item.rmk_tc || item.rmk_en || '';
                        remarkSpan.style.fontSize = '12px';
                        remarkSpan.style.color = '#777';

                        row.appendChild(timeSpan);
                        row.appendChild(remarkSpan);
                        content.appendChild(row);
                    });
                    status.textContent = `Last updated: ${new Date().toLocaleTimeString()}`;
                };

                if (cached) {
                    render(cached);
                } else {
                    content.textContent = 'Loading ETAs...';
                }

                const etas = await BusAPI.getETA(r.co, s.stop, r.route, serviceType, r.routeId);
                setFlashCache(r.co, s.stop, r.route, serviceType, etas);
                render(etas);
            } catch (error) {
                console.error('Error updating drawer ETA:', error);
                if (!content.innerHTML || content.textContent === 'Loading ETAs...') {
                    content.textContent = 'Error loading ETAs';
                }
            }
        }

        async function handleFavoriteClick(star, r, s) {
            const serviceType = r.service_type || 1;
            const cacheKey = `${r.co}-${r.route}-${s.stop}-${serviceType}`;
            const isFav = _favoriteStopsCache.has(cacheKey);

            if (isFav) {
                // Immediate UI update
                _favoriteStopsCache.delete(cacheKey);
                star.classList.remove('active');
                star.innerHTML = '<i class="far fa-star"></i>';
                
                // Async DB update
                const favs = await BusDB.getAll('favorites');
                const f = favs.find(f => f.co === r.co && f.stopId === s.stop && f.route === r.route && (f.serviceType || 1) === serviceType);
                if (f) {
                    await BusDB.delete('favorites', f.favId);
                    // No need to call renderFavorites() here as it would re-render everything
                    // but we might want to update the favorites list if it's visible.
                    // However, we are usually in the search results when this is clicked.
                }
            } else {
                // Immediate UI update
                _favoriteStopsCache.add(cacheKey);
                star.classList.add('active');
                star.innerHTML = '<i class="fas fa-star"></i>';
                
                // Async DB update
                await saveFavorite(r, s, true); 
            }
        }

        async function migrateFavorites() {
            const oldFavsJson = localStorage.getItem('bus_favs');
            if (oldFavsJson) {
                try {
                    const oldFavs = JSON.parse(oldFavsJson);
                    for (const f of oldFavs) {
                        // For migrated favorites, we don't have path_desc
                        if (!f.path_desc) f.path_desc = ''; 
                        await BusDB.put('favorites', f);
                    }
                    localStorage.removeItem('bus_favs');
                    console.log('Successfully migrated favorites to IndexedDB');
                } catch (e) {
                    console.error('Migration failed', e);
                }
            }
        }

        // Auto-refresh every 60 seconds
        setInterval(() => {
            console.log('Auto-refreshing ETAs...');
            refreshAllETAs();
        }, 60000);

        document.addEventListener('DOMContentLoaded', async () => {
            await BusDB.init();
            await migrateFavorites();
            syncRoutes();
            renderFavorites();
        });
    </script>
</body>
</html>
